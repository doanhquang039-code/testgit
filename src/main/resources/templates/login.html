<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .social-icon {
            transition: transform 0.2s;
            text-decoration: none;
        }

        .social-icon:hover {
            transform: scale(1.2);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 15px;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            font-weight: 700;
            color: #333;
        }

        .btn-login {
            background: #764ba2;
            border: none;
            color: white;
            padding: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #5a3a8a;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-header">
            <h2>HRMS LOGIN</h2>
            <p class="text-muted">Hệ thống quản lý nhân sự</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                class="bi bi-exclamation-triangle-fill me-2" viewBox="0 0 16 16">
                <path
                    d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9 1.017l-.5 5.004a.905.905 0 0 1-1.8 0l-.5-5.004C7.046 5.462 7.465 5 8 5zm0 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" />
            </svg>
            <div>Sai tài khoản hoặc mật khẩu!</div>
        </div>

        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                class="bi bi-check-circle-fill me-2" viewBox="0 0 16 16">
                <path
                    d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z" />
            </svg>
            <div>Đăng xuất thành công.</div>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Nhập username"
                    required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Nhập mật khẩu"
                    required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login rounded-pill shadow-sm">ĐĂNG NHẬP</button>
            </div>
        </form>
        <div th:if="${param.success}" class="alert alert-success">
            Đăng ký thành công! Mời bạn đăng nhập.
        </div>
        <div class="mt-4 text-center">
            <p class="text-muted small">Hoặc đăng nhập với</p>
            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/login/social?provider=google}" class="social-icon text-danger"><i
                        class="fab fa-google fa-lg"></i></a>
                <a th:href="@{/login/social?provider=facebook}" class="social-icon text-primary"><i
                        class="fab fa-facebook fa-lg"></i></a>
                <a th:href="@{/login/social?provider=zalo}" class="social-icon text-info"><i
                        class="fas fa-comment-dots fa-lg"></i></a>
                <a th:href="@{/login/social?provider=tiktok}" class="social-icon text-dark"><i
                        class="fab fa-tiktok fa-lg"></i></a>
                <a th:href="@{/login/social?provider=instagram}" class="social-icon text-danger"><i
                        class="fab fa-instagram fa-lg"></i></a>
            </div>
        </div>
    </div>

</body>

</html>
