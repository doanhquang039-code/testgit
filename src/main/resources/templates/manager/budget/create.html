<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Create Budget - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/manager-sidebar :: sidebar"></div>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-plus-circle me-2"></i>Create Budget</h1>
                    <a href="/manager/budget" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>Back to Budget
                    </a>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-body">
                                <form method="post" action="/manager/budget/create" th:object="${budget}">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Category *</label>
                                            <select class="form-select" th:field="*{category}" required>
                                                <option value="">Select Category</option>
                                                <option value="SALARY">Salary</option>
                                                <option value="TRAINING">Training</option>
                                                <option value="EQUIPMENT">Equipment</option>
                                                <option value="TRAVEL">Travel</option>
                                                <option value="MARKETING">Marketing</option>
                                                <option value="SOFTWARE">Software</option>
                                                <option value="OTHER">Other</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Allocated Budget ($) *</label>
                                            <input type="number" step="0.01" class="form-control" th:field="*{allocatedBudget}" required 
                                                   placeholder="10000.00">
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Year *</label>
                                            <select class="form-select" th:field="*{year}" required>
                                                <option value="">Select Year</option>
                                                <option value="2024">2024</option>
                                                <option value="2025">2025</option>
                                                <option value="2026" selected>2026</option>
                                                <option value="2027">2027</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Month *</label>
                                            <select class="form-select" th:field="*{month}" required>
                                                <option value="">Select Month</option>
                                                <option value="1">January</option>
                                                <option value="2">February</option>
                                                <option value="3">March</option>
                                                <option value="4" selected>April</option>
                                                <option value="5">May</option>
                                                <option value="6">June</option>
                                                <option value="7">July</option>
                                                <option value="8">August</option>
                                                <option value="9">September</option>
                                                <option value="10">October</option>
                                                <option value="11">November</option>
                                                <option value="12">December</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <textarea class="form-control" th:field="*{description}" rows="3" 
                                                  placeholder="Describe the budget purpose and details"></textarea>
                                    </div>

                                    <div class="alert alert-info">
                                        <i class="bi bi-info-circle me-2"></i>
                                        <strong>Note:</strong> The budget will be created with status "ACTIVE" and spent amount will be initialized to $0.
                                    </div>

                                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                        <a href="/manager/budget" class="btn btn-secondary me-md-2">Cancel</a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-check-circle me-1"></i>Create Budget
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
