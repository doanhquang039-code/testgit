<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Schedule Meeting - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/manager-sidebar :: sidebar"></div>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-plus-circle me-2"></i>Schedule Meeting</h1>
                    <a href="/manager/meetings" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>Back to Meetings
                    </a>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-body">
                                <form method="post" action="/manager/meetings/create" th:object="${meeting}">
                                    <div class="row">
                                        <div class="col-md-8 mb-3">
                                            <label class="form-label">Meeting Title *</label>
                                            <input type="text" class="form-control" th:field="*{title}" required 
                                                   placeholder="Enter meeting title">
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Meeting Type *</label>
                                            <select class="form-select" th:field="*{meetingType}" required>
                                                <option value="">Select Type</option>
                                                <option value="ONE_ON_ONE">1-on-1</option>
                                                <option value="TEAM_MEETING">Team Meeting</option>
                                                <option value="REVIEW">Review</option>
                                                <option value="PLANNING">Planning</option>
                                                <option value="STANDUP">Standup</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <textarea class="form-control" th:field="*{description}" rows="2" 
                                                  placeholder="Brief description of the meeting"></textarea>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Scheduled Date & Time *</label>
                                            <input type="datetime-local" class="form-control" th:field="*{scheduledTime}" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Duration (minutes) *</label>
                                            <select class="form-select" th:field="*{durationMinutes}" required>
                                                <option value="">Select Duration</option>
                                                <option value="15">15 minutes</option>
                                                <option value="30">30 minutes</option>
                                                <option value="45">45 minutes</option>
                                                <option value="60">1 hour</option>
                                                <option value="90">1.5 hours</option>
                                                <option value="120">2 hours</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Participant</label>
                                            <select class="form-select" th:field="*{participant}">
                                                <option value="">Select Participant (Optional for team meetings)</option>
                                                <option th:each="member : ${teamMembers}" 
                                                        th:value="${member.id}" 
                                                        th:text="${member.fullName}">Team Member</option>
                                            </select>
                                            <div class="form-text">Leave empty for team meetings</div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Location</label>
                                            <input type="text" class="form-control" th:field="*{location}" 
                                                   placeholder="Meeting room or location">
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Meeting Link</label>
                                        <input type="url" class="form-control" th:field="*{meetingLink}" 
                                               placeholder="https://zoom.us/j/123456789 (for virtual meetings)">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Agenda</label>
                                        <textarea class="form-control" th:field="*{agenda}" rows="4" 
                                                  placeholder="Meeting agenda and topics to discuss"></textarea>
                                    </div>

                                    <div class="alert alert-info">
                                        <i class="bi bi-info-circle me-2"></i>
                                        <strong>Note:</strong> Meeting invitations will be sent to participants automatically.
                                    </div>

                                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                        <a href="/manager/meetings" class="btn btn-secondary me-md-2">Cancel</a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-calendar-plus me-1"></i>Schedule Meeting
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
