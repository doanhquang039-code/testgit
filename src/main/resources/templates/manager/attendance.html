<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Attendance - Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/manager-sidebar :: sidebar"></div>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-calendar-check me-2"></i>Team Attendance</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <form class="d-flex me-2" method="get">
                            <input type="date" class="form-control form-control-sm" name="date" 
                                   th:value="${selectedDate}" onchange="this.form.submit()">
                        </form>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="location.reload()">
                            <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                        </button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card border-primary">
                            <div class="card-body">
                                <h6 class="text-muted">Total Members</h6>
                                <h2 class="text-primary" th:text="${totalMembers}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-success">
                            <div class="card-body">
                                <h6 class="text-muted">Present</h6>
                                <h2 class="text-success" th:text="${presentCount}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-warning">
                            <div class="card-body">
                                <h6 class="text-muted">Late</h6>
                                <h2 class="text-warning" th:text="${lateCount}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-danger">
                            <div class="card-body">
                                <h6 class="text-muted">Absent</h6>
                                <h2 class="text-danger" th:text="${absentCount}">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Attendance Table -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Attendance for <span th:text="${#temporals.format(selectedDate, 'dd/MM/yyyy')}">Date</span></h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Employee</th>
                                        <th>Check In</th>
                                        <th>Check Out</th>
                                        <th>Status</th>
                                        <th>Work Hours</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="att : ${attendances}">
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <img th:src="@{'/uploads/' + ${att.user.profileImage}}" 
                                                     class="rounded-circle me-2" 
                                                     width="35" height="35"
                                                     onerror="this.src='https://ui-avatars.com/api/?name=User&background=6366f1&color=fff'">
                                                <div>
                                                    <div class="fw-bold" th:text="${att.user.fullName}">Name</div>
                                                    <small class="text-muted" th:text="${att.user.employeeCode}">EMP001</small>
                                                </div>
                                            </div>
                                        </td>
                                        <td th:text="${att.checkInTime != null ? #temporals.format(att.checkInTime, 'HH:mm') : 'N/A'}">09:00</td>
                                        <td th:text="${att.checkOutTime != null ? #temporals.format(att.checkOutTime, 'HH:mm') : 'N/A'}">18:00</td>
                                        <td>
                                            <span class="badge" 
                                                  th:classappend="${att.status == 'PRESENT'} ? 'bg-success' : (${att.status == 'LATE'} ? 'bg-warning' : 'bg-danger')"
                                                  th:text="${att.status}">PRESENT</span>
                                        </td>
                                        <td th:text="${att.workHours != null ? att.workHours + 'h' : 'N/A'}">8h</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div th:if="${#lists.isEmpty(attendances)}" class="text-center text-muted py-4">
                            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                            <p class="mt-2">No attendance records for this date</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
