<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Team Goals - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/manager-sidebar :: sidebar"></div>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-bullseye me-2"></i>Team Goals</h1>
                    <a href="/manager/goals/create" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-1"></i>Create Goal
                    </a>
                </div>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Goal Statistics -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 th:text="${goalStats.totalGoals}">8</h3>
                                <p class="text-muted mb-0">Total Goals</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 class="text-success" th:text="${goalStats.completedGoals}">3</h3>
                                <p class="text-muted mb-0">Completed</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 class="text-primary" th:text="${goalStats.inProgressGoals}">4</h3>
                                <p class="text-muted mb-0">In Progress</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 th:text="${#numbers.formatDecimal(goalStats.avgProgress, 1, 1)} + '%'">75%</h3>
                                <p class="text-muted mb-0">Avg Progress</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Goals Table -->
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Goal</th>
                                    <th>Type</th>
                                    <th>Progress</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>End Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="goal : ${goals}">
                                    <td>
                                        <h6 class="mb-1" th:text="${goal.title}">Goal Title</h6>
                                        <small class="text-muted" th:text="${goal.description}">Description</small>
                                    </td>
                                    <td><span class="badge bg-info" th:text="${goal.goalType}">QUARTERLY</span></td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="progress me-2" style="width: 100px; height: 8px;">
                                                <div class="progress-bar" th:style="'width: ' + ${goal.progressPercentage} + '%'"></div>
                                            </div>
                                            <span th:text="${goal.progressPercentage} + '%'">75%</span>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${goal.priority == 'HIGH'} ? 'bg-danger' : (${goal.priority == 'MEDIUM'} ? 'bg-warning' : 'bg-secondary')"
                                              th:text="${goal.priority}">HIGH</span>
                                    </td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${goal.status == 'COMPLETED'} ? 'bg-success' : (${goal.status == 'IN_PROGRESS'} ? 'bg-primary' : 'bg-secondary')"
                                              th:text="${goal.status}">IN_PROGRESS</span>
                                    </td>
                                    <td th:text="${#temporals.format(goal.endDate, 'dd/MM/yyyy')}">31/12/2026</td>
                                    <td>
                                        <div class="btn-group" role="group">
                                            <a th:href="@{/manager/goals/view/{id}(id=${goal.id})}" class="btn btn-sm btn-outline-info">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                            <a th:href="@{/manager/goals/edit/{id}(id=${goal.id})}" class="btn btn-sm btn-outline-primary">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <button type="button" class="btn btn-sm btn-outline-success" 
                                                    data-bs-toggle="modal" th:data-bs-target="'#progressModal' + ${goal.id}">
                                                <i class="bi bi-arrow-up-circle"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Progress Update Modals -->
                <div th:each="goal : ${goals}" class="modal fade" th:id="'progressModal' + ${goal.id}" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Update Progress</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <form method="post" th:action="@{/manager/goals/progress/{id}(id=${goal.id})}">
                                <div class="modal-body">
                                    <p><strong th:text="${goal.title}">Goal Title</strong></p>
                                    <div class="mb-3">
                                        <label class="form-label">Current Value</label>
                                        <input type="number" class="form-control" name="currentValue" 
                                               th:value="${goal.currentValue}" required>
                                        <div class="form-text">Target: <span th:text="${goal.targetValue}">100</span></div>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                    <button type="submit" class="btn btn-primary">Update Progress</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
