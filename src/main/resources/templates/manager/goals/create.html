<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Create Team Goal - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/manager-sidebar :: sidebar"></div>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-plus-circle me-2"></i>Create Team Goal</h1>
                    <a href="/manager/goals" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>Back to Goals
                    </a>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-body">
                                <form method="post" action="/manager/goals/create" th:object="${goal}">
                                    <div class="row">
                                        <div class="col-md-8 mb-3">
                                            <label class="form-label">Goal Title *</label>
                                            <input type="text" class="form-control" th:field="*{title}" required 
                                                   placeholder="Enter goal title">
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Goal Type *</label>
                                            <select class="form-select" th:field="*{goalType}" required>
                                                <option value="">Select Type</option>
                                                <option value="QUARTERLY">Quarterly</option>
                                                <option value="ANNUAL">Annual</option>
                                                <option value="PROJECT">Project</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <textarea class="form-control" th:field="*{description}" rows="3" 
                                                  placeholder="Describe the goal in detail"></textarea>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Target Value *</label>
                                            <input type="number" class="form-control" th:field="*{targetValue}" required 
                                                   placeholder="100">
                                            <div class="form-text">The target number to achieve</div>
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Priority *</label>
                                            <select class="form-select" th:field="*{priority}" required>
                                                <option value="">Select Priority</option>
                                                <option value="LOW">Low</option>
                                                <option value="MEDIUM">Medium</option>
                                                <option value="HIGH">High</option>
                                                <option value="CRITICAL">Critical</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Current Value</label>
                                            <input type="number" class="form-control" th:field="*{currentValue}" 
                                                   placeholder="0" value="0">
                                            <div class="form-text">Current progress (optional)</div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Start Date *</label>
                                            <input type="date" class="form-control" th:field="*{startDate}" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">End Date *</label>
                                            <input type="date" class="form-control" th:field="*{endDate}" required>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Notes</label>
                                        <textarea class="form-control" th:field="*{notes}" rows="2" 
                                                  placeholder="Additional notes or comments"></textarea>
                                    </div>

                                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                        <a href="/manager/goals" class="btn btn-secondary me-md-2">Cancel</a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-check-circle me-1"></i>Create Goal
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
