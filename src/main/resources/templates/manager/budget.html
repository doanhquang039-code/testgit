<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Management - Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/manager-sidebar :: sidebar"></div>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-cash-stack me-2"></i>Budget Management</h1>
                </div>

                <!-- Coming Soon Message -->
                <div class="row">
                    <div class="col-md-12">
                        <div class="card border-info">
                            <div class="card-body text-center py-5">
                                <i class="bi bi-hourglass-split text-info" style="font-size: 4rem;"></i>
                                <h3 class="mt-3">Budget Management</h3>
                                <p class="text-muted" th:text="${message}">This feature is coming soon</p>
                                <p class="text-muted">You will be able to manage team budgets, track expenses, and generate budget reports.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Placeholder Stats -->
                <div class="row mt-4">
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="text-muted">Total Budget</h6>
                                <h2 th:text="${totalBudget}">$0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="text-muted">Used Budget</h6>
                                <h2 th:text="${usedBudget}">$0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="text-muted">Remaining Budget</h6>
                                <h2 th:text="${remainingBudget}">$0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
