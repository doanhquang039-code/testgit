<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm công GPS - Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #map {
            height: 400px;
            border-radius: 10px;
        }
        .location-card {
            cursor: pointer;
            transition: all 0.3s;
        }
        .location-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .location-card.selected {
            border: 2px solid #0d6efd;
            background-color: #e7f1ff;
        }
        .status-badge {
            font-size: 1.2rem;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-12">
                <h2><i class="fas fa-map-marker-alt me-2"></i>Chấm công GPS</h2>
                <p class="text-muted">Sử dụng vị trí GPS để chấm công</p>
            </div>
        </div>

        <!-- Current Status -->
        <div class="card mb-4">
            <div class="card-body text-center">
                <h5>Trạng thái hiện tại</h5>
                <span class="badge status-badge bg-warning" id="statusBadge">
                    <i class="fas fa-clock me-2"></i>Chưa chấm công
                </span>
                <div class="mt-3">
                    <p class="mb-1"><strong>Thời gian:</strong> <span id="currentTime">--:--:--</span></p>
                    <p class="mb-0"><strong>Ngày:</strong> <span id="currentDate">--/--/----</span></p>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Map -->
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5><i class="fas fa-map me-2"></i>Bản đồ vị trí</h5>
                    </div>
                    <div class="card-body">
                        <div id="map"></div>
                        <div class="mt-3">
                            <button class="btn btn-primary" id="getLocationBtn">
                                <i class="fas fa-crosshairs me-2"></i>Lấy vị trí hiện tại
                            </button>
                            <span class="ms-3" id="locationStatus"></span>
                        </div>
                    </div>
                </div>

                <!-- Check-in Form -->
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-check-circle me-2"></i>Chấm công</h5>
                    </div>
                    <div class="card-body">
                        <form id="checkinForm">
                            <div class="mb-3">
                                <label class="form-label">Vị trí làm việc <span class="text-danger">*</span></label>
                                <select class="form-select" id="locationSelect" required>
                                    <option value="">-- Chọn vị trí --</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Ghi chú</label>
                                <textarea class="form-control" id="notes" rows="3" 
                                          placeholder="Ghi chú về ca làm việc..."></textarea>
                            </div>

                            <div class="alert alert-info">
                                <i class="fas fa-info-circle me-2"></i>
                                Bạn cần ở trong bán kính cho phép của địa điểm để chấm công
                            </div>

                            <input type="hidden" id="latitude">
                            <input type="hidden" id="longitude">

                            <button type="submit" class="btn btn-success btn-lg w-100" id="checkinBtn">
                                <i class="fas fa-sign-in-alt me-2"></i>Chấm công vào
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Locations List -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-building me-2"></i>Địa điểm</h5>
                    </div>
                    <div class="card-body">
                        <div id="locationsList">
                            <!-- Locations will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Today's Attendance -->
                <div class="card mt-4">
                    <div class="card-header">
                        <h5><i class="fas fa-calendar-day me-2"></i>Hôm nay</h5>
                    </div>
                    <div class="card-body">
                        <div id="todayAttendance">
                            <p class="text-muted text-center">Chưa có dữ liệu</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let userLat, userLng;
        let locations = [];

        // Update current time
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('vi-VN');
            document.getElementById('currentDate').textContent = now.toLocaleDateString('vi-VN');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Get user location
        document.getElementById('getLocationBtn').addEventListener('click', function() {
            if (navigator.geolocation) {
                document.getElementById('locationStatus').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lấy vị trí...';
                
                navigator.geolocation.getCurrentPosition(function(position) {
                    userLat = position.coords.latitude;
                    userLng = position.coords.longitude;
                    
                    document.getElementById('latitude').value = userLat;
                    document.getElementById('longitude').value = userLng;
                    document.getElementById('locationStatus').innerHTML = 
                        '<span class="text-success"><i class="fas fa-check-circle"></i> Đã lấy vị trí</span>';
                    
                    // Show on map (simplified - in real app use Google Maps or Leaflet)
                    console.log('User location:', userLat, userLng);
                }, function(error) {
                    document.getElementById('locationStatus').innerHTML = 
                        '<span class="text-danger"><i class="fas fa-times-circle"></i> Không thể lấy vị trí</span>';
                    alert('Vui lòng cho phép truy cập vị trí');
                });
            } else {
                alert('Trình duyệt không hỗ trợ GPS');
            }
        });

        // Load locations (mock data - replace with API call)
        function loadLocations() {
            // Mock data
            locations = [
                { id: 1, name: 'Văn phòng chính', address: '123 Đường ABC, Quận 1', radius: 100, lat: 10.7769, lng: 106.7009 },
                { id: 2, name: 'Chi nhánh 2', address: '456 Đường XYZ, Quận 3', radius: 50, lat: 10.7869, lng: 106.7109 }
            ];

            const locationsList = document.getElementById('locationsList');
            const locationSelect = document.getElementById('locationSelect');
            
            locationsList.innerHTML = '';
            locations.forEach(loc => {
                locationsList.innerHTML += `
                    <div class="location-card card mb-2 p-2" data-id="${loc.id}">
                        <h6 class="mb-1">${loc.name}</h6>
                        <small class="text-muted">${loc.address}</small>
                        <small class="d-block text-info">Bán kính: ${loc.radius}m</small>
                    </div>
                `;
                
                locationSelect.innerHTML += `<option value="${loc.id}">${loc.name}</option>`;
            });
        }

        // Check-in form submit
        document.getElementById('checkinForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const locationId = document.getElementById('locationSelect').value;
            const lat = document.getElementById('latitude').value;
            const lng = document.getElementById('longitude').value;
            const notes = document.getElementById('notes').value;
            
            if (!lat || !lng) {
                alert('Vui lòng lấy vị trí GPS trước');
                return;
            }
            
            if (!locationId) {
                alert('Vui lòng chọn địa điểm');
                return;
            }
            
            // Send to server (mock)
            console.log('Check-in:', { locationId, lat, lng, notes });
            alert('Chấm công thành công!');
            
            document.getElementById('statusBadge').className = 'badge status-badge bg-success';
            document.getElementById('statusBadge').innerHTML = '<i class="fas fa-check-circle me-2"></i>Đã chấm công';
        });

        // Initialize
        loadLocations();
    </script>
</body>
</html>
