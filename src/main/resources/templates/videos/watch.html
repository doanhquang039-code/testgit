<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${video.title} + ' - HRMS'">Xem Video</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; min-height: 100vh; margin: 0; }
        .top-bar { background: #1e293b; padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 100; }
        .top-bar a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .top-bar a:hover { color: white; }
        .top-bar .brand { color: white; font-weight: 700; font-size: 1rem; margin-right: auto; }

        .watch-layout { display: grid; grid-template-columns: 1fr 340px; gap: 0; min-height: calc(100vh - 53px); }

        /* Main player area */
        .player-area { padding: 0; }
        .video-player-wrap { background: black; width: 100%; aspect-ratio: 16/9; }
        .video-player-wrap video { width: 100%; height: 100%; display: block; }
        .video-details { padding: 20px 24px; background: #1e293b; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .video-title-main { font-size: 1.2rem; font-weight: 800; color: white; margin: 0 0 10px; }
        .video-meta-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: #94a3b8; }
        .cat-badge { background: rgba(124,58,237,0.3); color: #c4b5fd; padding: 3px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .video-desc { padding: 20px 24px; background: #1e293b; color: #94a3b8; font-size: 0.88rem; line-height: 1.7; }
        .tags-row { padding: 0 24px 20px; background: #1e293b; display: flex; gap: 6px; flex-wrap: wrap; }
        .tag-chip { background: rgba(255,255,255,0.08); color: #94a3b8; padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; }

        /* Sidebar related */
        .related-panel { background: #1e293b; border-left: 1px solid rgba(255,255,255,0.08); overflow-y: auto; max-height: calc(100vh - 53px); }
        .related-header { padding: 16px 18px; font-weight: 700; color: white; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; background: #1e293b; z-index: 10; }
        .related-card { display: flex; gap: 10px; padding: 12px 16px; text-decoration: none; transition: background 0.15s; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .related-card:hover { background: rgba(255,255,255,0.05); }
        .related-thumb { width: 120px; height: 68px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: #0f172a; }
        .related-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .related-info { flex: 1; min-width: 0; }
        .related-title { font-size: 0.82rem; font-weight: 600; color: #e2e8f0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .related-meta { font-size: 0.72rem; color: #64748b; margin-top: 4px; }
        .no-related { padding: 32px 16px; text-align: center; color: #475569; font-size: 0.85rem; }

        @media (max-width: 900px) {
            .watch-layout { grid-template-columns: 1fr; }
            .related-panel { max-height: none; border-left: none; border-top: 1px solid rgba(255,255,255,0.08); }
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <a th:href="@{/videos}"><i class="bi bi-arrow-left"></i> Thư viện</a>
    <span class="brand">⚡ HRMS Training</span>
    <a th:href="@{/user1/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
</div>

<div class="watch-layout">
    <!-- Player + Info -->
    <div class="player-area">
        <div class="video-player-wrap">
            <video controls autoplay preload="metadata" poster="${video.thumbnailOrDefault}">
                <source th:src="${video.videoUrl}" type="video/mp4"/>
                Trình duyệt không hỗ trợ phát video.
            </video>
        </div>

        <div class="video-details">
            <h1 class="video-title-main" th:text="${video.title}"></h1>
            <div class="video-meta-row">
                <span th:if="${video.category}" class="cat-badge" th:text="${video.category}"></span>
                <span class="meta-item" th:if="${video.durationSec != null and video.durationSec > 0}">
                    <i class="bi bi-clock"></i><span th:text="${video.formattedDuration}"></span>
                </span>
                <span class="meta-item">
                    <i class="bi bi-eye"></i><span th:text="${video.viewCount != null ? video.viewCount : 0} + ' lượt xem'"></span>
                </span>
                <span class="meta-item" th:if="${video.uploader != null}">
                    <i class="bi bi-person"></i><span th:text="${video.uploader?.fullName}"></span>
                </span>
                <span class="meta-item" th:if="${video.createdAt != null}">
                    <i class="bi bi-calendar"></i>
                    <span th:text="${#temporals.format(video.createdAt, 'dd/MM/yyyy')}"></span>
                </span>
            </div>
        </div>

        <div class="video-desc" th:if="${video.description != null and !#strings.isEmpty(video.description)}">
            <div style="font-weight:600;color:#e2e8f0;margin-bottom:8px;">Mô tả</div>
            <div th:text="${video.description}"></div>
        </div>

        <div class="tags-row" th:if="${video.tags != null and !#strings.isEmpty(video.tags)}">
            <span th:each="tag : ${video.tagArray}" class="tag-chip" th:text="'#' + ${tag.trim()}"></span>
        </div>
    </div>

    <!-- Related videos -->
    <div class="related-panel">
        <div class="related-header">
            <i class="bi bi-collection-play me-2"></i>Video liên quan
        </div>

        <div th:if="${#lists.isEmpty(related)}" class="no-related">
            <i class="bi bi-film" style="font-size:2rem;display:block;margin-bottom:8px;"></i>
            Không có video liên quan
        </div>

        <a th:each="r : ${related}" th:href="@{/videos/{id}(id=${r.id})}" class="related-card">
            <div class="related-thumb">
                <img th:src="${r.thumbnailOrDefault}" th:alt="${r.title}"
                     onerror="this.src='https://placehold.co/120x68/0f172a/475569?text=Video'"/>
            </div>
            <div class="related-info">
                <div class="related-title" th:text="${r.title}"></div>
                <div class="related-meta">
                    <span th:if="${r.durationSec != null and r.durationSec > 0}" th:text="${r.formattedDuration} + ' · '"></span>
                    <span th:text="${(r.viewCount != null ? r.viewCount : 0) + ' lượt xem'}"></span>
                </div>
            </div>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
