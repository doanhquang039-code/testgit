<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Upload Video Đào Tạo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow-sm p-4">
        <h3>Tải lên Video Đào Tạo Nhân Viên</h3>
        <hr />
        <form
          th:action="@{/videos/upload}"
          method="post"
          enctype="multipart/form-data"
        >
          <div class="mb-3">
            <input
              type="file"
              name="file"
              class="form-control"
              accept="video/*"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">Bắt đầu tải lên</button>
        </form>

        <div th:if="${message}" class="alert alert-info mt-3">
          <p th:text="${message}"></p>
          <div th:if="${videoUrl}">
            <video width="100%" controls class="mt-2 rounded shadow">
              <source th:src="${videoUrl}" type="video/mp4" />
              Trình duyệt của bạn không hỗ trợ xem video.
            </video>
            <p class="small mt-2">
              Link video:
              <a
                th:href="${videoUrl}"
                th:text="${videoUrl}"
                target="_blank"
              ></a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
