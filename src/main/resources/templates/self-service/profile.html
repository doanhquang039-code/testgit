<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-4">
        <h2><i class="fas fa-user-circle me-2"></i>Hồ sơ của tôi</h2>
        
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row mt-4">
            <!-- Profile Summary -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <img th:src="${user.profileImage}" alt="Profile" 
                             class="rounded-circle mb-3" style="width: 150px; height: 150px; object-fit: cover;">
                        <h4 th:text="${user.fullName}">Full Name</h4>
                        <p class="text-muted" th:text="${user.email}">Email</p>
                        <p class="text-muted" th:text="${user.employeeCode}">Employee Code</p>
                        <span class="badge bg-success" th:if="${user.status == 'ACTIVE'}">Đang làm việc</span>
                    </div>
                </div>
            </div>

            <!-- Profile Form -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Thông tin chi tiết</h5>
                    </div>
                    <div class="card-body">
                        <form method="post" th:action="@{/self-service/profile/update}" th:object="${profile}">
                            
                            <!-- Emergency Contact -->
                            <h6 class="border-bottom pb-2 mb-3">Liên hệ khẩn cấp</h6>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Tên người liên hệ</label>
                                    <input type="text" class="form-control" th:field="*{emergencyContactName}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Số điện thoại</label>
                                    <input type="text" class="form-control" th:field="*{emergencyContactPhone}">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mối quan hệ</label>
                                <input type="text" class="form-control" th:field="*{emergencyContactRelation}">
                            </div>

                            <!-- Bank Information -->
                            <h6 class="border-bottom pb-2 mb-3 mt-4">Thông tin ngân hàng</h6>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Tên ngân hàng</label>
                                    <input type="text" class="form-control" th:field="*{bankName}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Số tài khoản</label>
                                    <input type="text" class="form-control" th:field="*{bankAccountNumber}">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tên chủ tài khoản</label>
                                <input type="text" class="form-control" th:field="*{bankAccountName}">
                            </div>

                            <!-- Address -->
                            <h6 class="border-bottom pb-2 mb-3 mt-4">Địa chỉ</h6>
                            <div class="mb-3">
                                <label class="form-label">Địa chỉ hiện tại</label>
                                <textarea class="form-control" rows="2" th:field="*{currentAddress}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Địa chỉ thường trú</label>
                                <textarea class="form-control" rows="2" th:field="*{permanentAddress}"></textarea>
                            </div>

                            <!-- Bio & Skills -->
                            <h6 class="border-bottom pb-2 mb-3 mt-4">Giới thiệu & Kỹ năng</h6>
                            <div class="mb-3">
                                <label class="form-label">Giới thiệu bản thân</label>
                                <textarea class="form-control" rows="3" th:field="*{bio}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Kỹ năng (phân cách bằng dấu phẩy)</label>
                                <textarea class="form-control" rows="2" th:field="*{skills}"></textarea>
                            </div>

                            <div class="text-end">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Lưu thay đổi
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
