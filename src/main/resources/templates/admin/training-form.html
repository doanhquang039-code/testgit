<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương trình đào tạo - HRMS Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { margin: 0; background: linear-gradient(180deg, #eef2f7 0%, #f8fafc 100%); color: #0f172a; }
        .sidebar {
            width: 248px; min-height: 100vh; position: fixed; inset: 0 auto 0 0;
            background: linear-gradient(180deg, #111827 0%, #1f2937 48%, #0f172a 100%);
            color: white; z-index: 100; overflow-y: auto;
        }
        .sidebar-logo { font-size: 1rem; font-weight: 800; letter-spacing: 1.5px; text-align: center; padding: 20px 16px 14px; }
        .sidebar a {
            display: flex; align-items: center; gap: 10px; color: #94a3b8; text-decoration: none;
            padding: 10px 20px; border-left: 3px solid transparent; transition: all .2s; font-size: .86rem;
        }
        .sidebar a:hover, .sidebar a.active { color: white; background: rgba(255,255,255,.07); border-left-color: #f59e0b; }
        .sidebar hr { border-color: rgba(255,255,255,.1); margin: 10px 16px; }
        .main { margin-left: 248px; padding: 28px 30px 56px; }
        .form-card {
            background: rgba(255,255,255,.92); backdrop-filter: blur(12px);
            border: 1px solid rgba(148,163,184,.18); box-shadow: 0 14px 34px rgba(15,23,42,.08);
            border-radius: 24px; padding: 32px; max-width: 800px;
        }
        .form-label { font-size: .76rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; font-weight: 700; margin-bottom: 6px; }
        .form-control, .form-select, textarea.form-control { border-radius: 14px; border-color: #dbe2ea; }
        .form-control:focus, .form-select:focus { border-color: #f97316; box-shadow: 0 0 0 .2rem rgba(249,115,22,.12); }
        .btn-soft { border-radius: 14px; font-weight: 700; min-height: 46px; padding: 10px 20px; }
        .btn-primary.btn-soft { border: none; background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
        .btn-outline-dark.btn-soft { border-color: #cbd5e1; color: #334155; background: white; }
        .lang-toggle-wrap { padding: 8px 16px; border-top: 1px solid rgba(255,255,255,.08); margin-top: 8px; }
        .lang-toggle { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .lang-btn { background: rgba(255,255,255,.08)!important; border: 1px solid rgba(255,255,255,.15)!important; color: #94a3b8!important; border-radius: 8px!important; padding: 4px 10px!important; font-size: .75rem!important; font-weight: 600!important; }
        .lang-btn.active { background: #f59e0b!important; border-color: #f59e0b!important; color: white!important; }
        @media (max-width: 991px) { .sidebar { position: relative; width: 100%; min-height: auto; } .main { margin-left: 0; padding: 20px 16px 40px; } }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">⚡ HRMS ADMIN</div>
    <hr>
    <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Nhân viên</a>
    <a th:href="@{/admin/departments}"><i class="bi bi-building"></i> Phòng ban</a>
    <a th:href="@{/admin/positions}"><i class="bi bi-briefcase"></i> Chức vụ</a>
    <hr>
    <a th:href="@{/admin/contracts}"><i class="bi bi-file-text"></i> Hợp đồng</a>
    <a th:href="@{/admin/payroll}"><i class="bi bi-cash-coin"></i> Bảng lương</a>
    <a th:href="@{/admin/payments}"><i class="bi bi-bank"></i> Thanh toán</a>
    <a th:href="@{/admin/documents}"><i class="bi bi-folder2-open"></i> Tài liệu</a>
    <a th:href="@{/admin/leaves}"><i class="bi bi-calendar-x"></i> Nghỉ phép</a>
    <a th:href="@{/admin/attendance}"><i class="bi bi-clipboard-check"></i> Chấm công</a>
    <a th:href="@{/admin/tasks}"><i class="bi bi-list-task"></i> Công việc</a>
    <a th:href="@{/admin/assignments}"><i class="bi bi-person-check"></i> Phân công</a>
    <a th:href="@{/admin/shifts}"><i class="bi bi-clock-history"></i> Ca làm việc</a>
    <hr>
    <a th:href="@{/admin/reviews}"><i class="bi bi-star-half"></i> Đánh giá KPI</a>
    <a th:href="@{/admin/kpi-goals}"><i class="bi bi-bullseye"></i> Mục tiêu KPI</a>
    <a th:href="@{/admin/skills}"><i class="bi bi-tools"></i> Kỹ năng NV</a>
    <a th:href="@{/admin/training}" class="active"><i class="bi bi-mortarboard"></i> Đào tạo</a>
    <hr>
    <a th:href="@{/admin/expenses}"><i class="bi bi-receipt"></i> Chi phí</a>
    <a th:href="@{/admin/assets}"><i class="bi bi-box-seam"></i> Tài sản</a>
    <a th:href="@{/admin/announcements}"><i class="bi bi-megaphone"></i> Thông báo</a>
    <a th:href="@{/admin/reports}"><i class="bi bi-bar-chart-line"></i> Báo cáo</a>
    <a th:href="@{/admin/audit-log}"><i class="bi bi-journal-text"></i> Nhật ký</a>
    <a th:href="@{/hiring}"><i class="bi bi-person-plus"></i> Tuyển dụng</a>
    <div class="lang-toggle-wrap">
        <div class="lang-toggle">
            <button class="lang-btn" data-lang="vi">&#127475;&#127483; VI</button>
            <span style="color:rgba(255,255,255,.2);font-size:.7rem;">|</span>
            <button class="lang-btn" data-lang="en">&#127468;&#127463; EN</button>
        </div>
    </div>
    <form th:action="@{/logout}" method="post" class="px-3 mt-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
    </form>
</div>

<main class="main">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin/training}" class="btn btn-outline-dark btn-soft" style="min-height:auto;padding:8px 16px;">
            <i class="bi bi-arrow-left me-1"></i> Quay lại
        </a>
        <h1 class="h3 fw-bold mb-0" th:text="${program.id != null ? 'Chỉnh sửa chương trình đào tạo' : 'Tạo chương trình đào tạo mới'}"></h1>
    </div>

    <div class="form-card">
        <form th:action="@{/admin/training/save}" method="post" th:object="${program}">
            <input type="hidden" th:field="*{id}">

            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Tên chương trình *</label>
                    <input type="text" th:field="*{programName}" class="form-control" required placeholder="VD: Kỹ năng giao tiếp nâng cao">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Loại đào tạo</label>
                    <select th:field="*{trainingType}" class="form-select">
                        <option value="INTERNAL">Nội bộ</option>
                        <option value="EXTERNAL">Bên ngoài</option>
                        <option value="ONLINE">Online</option>
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label">Mô tả</label>
                    <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Mô tả chi tiết về chương trình đào tạo..."></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Giảng viên</label>
                    <input type="text" th:field="*{instructor}" class="form-control" placeholder="Tên giảng viên">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phòng ban</label>
                    <select th:field="*{department}" class="form-select">
                        <option value="">Tất cả phòng ban</option>
                        <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.departmentName}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Ngày bắt đầu</label>
                    <input type="date" th:field="*{startDate}" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Ngày kết thúc</label>
                    <input type="date" th:field="*{endDate}" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Sức chứa tối đa</label>
                    <input type="number" th:field="*{maxCapacity}" class="form-control" min="1">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Trạng thái</label>
                    <select th:field="*{status}" class="form-select">
                        <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.displayName}"></option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Địa điểm</label>
                    <input type="text" th:field="*{location}" class="form-control" placeholder="VD: Phòng họp A">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ngân sách (VNĐ)</label>
                    <input type="number" th:field="*{budget}" class="form-control" min="0" step="100000">
                </div>
            </div>

            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary btn-soft">
                    <i class="bi bi-check-lg me-1"></i> Lưu chương trình
                </button>
                <a th:href="@{/admin/training}" class="btn btn-outline-dark btn-soft">Hủy</a>
            </div>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
</body>
</html>
