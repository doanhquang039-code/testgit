<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý cấu hình hệ thống - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .settings-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .settings-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .setting-key {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #2563eb;
            background: #eff6ff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .setting-input {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px 12px;
            transition: all 0.3s;
        }
        .setting-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .setting-desc {
            font-size: 0.85rem;
            color: #6b7280;
            font-style: italic;
        }
        .add-setting-card {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 15px;
            color: white;
        }
        .stats-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stats-item h3 {
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
        }
        .stats-item p {
            margin: 5px 0 0 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Include sidebar -->
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
            
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-gear me-2 text-primary"></i>Cấu hình hệ thống</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button class="btn btn-outline-primary" onclick="document.getElementById('addForm').scrollIntoView()">
                            <i class="bi bi-plus-circle me-1"></i>Thêm cấu hình
                        </button>
                    </div>
                </div>

                <!-- Flash messages -->
                <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Statistics -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="stats-item">
                            <h3 th:text="${#lists.size(settings)}">0</h3>
                            <p>Tổng cấu hình</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stats-item" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <h3>4</h3>
                            <p>Cấu hình mặc định</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stats-item" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                            <h3>✓</h3>
                            <p>Hệ thống ổn định</p>
                        </div>
                    </div>
                </div>

                <!-- Settings List -->
                <div class="settings-card card mb-4">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0"><i class="bi bi-sliders me-2"></i>Danh sách cấu hình</h5>
                    </div>
                    <div class="card-body p-0">
                        <form th:action="@{/admin/settings/update}" method="post">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="bg-light">
                                        <tr>
                                            <th class="ps-4" style="width: 25%">Mã cấu hình</th>
                                            <th style="width: 35%">Giá trị</th>
                                            <th class="pe-4" style="width: 40%">Mô tả</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="setting : ${settings}">
                                            <td class="ps-4">
                                                <span class="setting-key" th:text="${setting.settingKey}">SETTING_KEY</span>
                                            </td>
                                            <td>
                                                <input type="text" class="form-control setting-input" 
                                                       th:name="${setting.settingKey}" 
                                                       th:value="${setting.settingValue}"
                                                       placeholder="Nhập giá trị...">
                                            </td>
                                            <td class="pe-4">
                                                <span class="setting-desc" th:text="${setting.description}">Mô tả cấu hình</span>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(settings)}">
                                            <td colspan="3" class="text-center py-5">
                                                <i class="bi bi-gear" style="font-size: 3rem; color: #dee2e6;"></i>
                                                <p class="text-muted mt-2">Chưa có cấu hình nào</p>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="card-footer bg-white text-end py-3" th:if="${!#lists.isEmpty(settings)}">
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-save me-1"></i>Lưu tất cả thay đổi
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Add New Setting -->
                <div class="card add-setting-card" id="addForm">
                    <div class="card-header border-0 py-3">
                        <h5 class="mb-0 text-white">
                            <i class="bi bi-plus-circle me-2"></i>Thêm cấu hình mới
                        </h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/settings/add}" method="post" class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label fw-bold text-white">
                                    <i class="bi bi-key me-1"></i>Mã cấu hình
                                </label>
                                <input type="text" name="settingKey" class="form-control" required 
                                       placeholder="VD: MAX_FILE_SIZE">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-white">
                                    <i class="bi bi-input-cursor me-1"></i>Giá trị
                                </label>
                                <input type="text" name="settingValue" class="form-control" required 
                                       placeholder="VD: 10MB">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-white">
                                    <i class="bi bi-chat-text me-1"></i>Mô tả
                                </label>
                                <input type="text" name="description" class="form-control" 
                                       placeholder="Kích thước file tối đa">
                            </div>
                            <div class="col-md-1 d-flex align-items-end">
                                <button type="submit" class="btn btn-light w-100 fw-bold">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
