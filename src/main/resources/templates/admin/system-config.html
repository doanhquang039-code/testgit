<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>System Configuration - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/admin-sidebar :: sidebar"></div>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-sliders me-2"></i>System Configuration</h1>
                </div>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="accordion" id="configAccordion">
                    <div th:each="entry : ${configsByCategory}" class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" 
                                    th:data-bs-target="'#collapse' + ${entry.key}">
                                <i class="bi bi-gear me-2"></i><span th:text="${entry.key}">Category</span>
                            </button>
                        </h2>
                        <div th:id="'collapse' + ${entry.key}" class="accordion-collapse collapse show">
                            <div class="accordion-body">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>Key</th>
                                            <th>Value</th>
                                            <th>Description</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="config : ${entry.value}">
                                            <td th:text="${config.key}">key</td>
                                            <td>
                                                <input type="text" class="form-control form-control-sm" 
                                                       th:value="${config.value}" th:id="'value_' + ${config.id}">
                                            </td>
                                            <td th:text="${config.description}">Description</td>
                                            <td>
                                                <button class="btn btn-sm btn-primary" 
                                                        th:onclick="'updateConfig(' + ${config.id} + ', \'' + ${config.key} + '\')'">
                                                    <i class="bi bi-save"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateConfig(id, key) {
            const value = document.getElementById('value_' + id).value;
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/admin/system-config/update';
            
            const keyInput = document.createElement('input');
            keyInput.type = 'hidden';
            keyInput.name = 'key';
            keyInput.value = key;
            form.appendChild(keyInput);
            
            const valueInput = document.createElement('input');
            valueInput.type = 'hidden';
            valueInput.name = 'value';
            valueInput.value = value;
            form.appendChild(valueInput);
            
            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>
</html>
