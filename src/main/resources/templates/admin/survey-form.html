<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${survey.id != null ? 'Sửa khảo sát' : 'Tạo khảo sát mới'}">Tạo khảo sát</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
            
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">
                        <i class="bi bi-clipboard-data me-2"></i>
                        <span th:text="${survey.id != null ? 'Sửa khảo sát' : 'Tạo khảo sát mới'}">Tạo khảo sát mới</span>
                    </h1>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="@{${survey.id != null ? '/engagement/admin/surveys/' + survey.id + '/update' : '/engagement/admin/surveys/create'}}" 
                              method="post" th:object="${survey}">
                            
                            <div class="mb-3">
                                <label for="title" class="form-label">Tiêu đề khảo sát <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="title" th:field="*{title}" required>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Mô tả</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="questions" class="form-label">Câu hỏi (JSON format) <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="questions" th:field="*{questions}" rows="10" required></textarea>
                                <small class="form-text text-muted">
                                    Format: [{"question": "Câu hỏi 1?", "type": "text"}, {"question": "Câu hỏi 2?", "type": "rating", "scale": 5}]
                                </small>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="startDate" class="form-label">Ngày bắt đầu <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="startDate" th:field="*{startDate}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="endDate" class="form-label">Ngày kết thúc <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="endDate" th:field="*{endDate}" required>
                                </div>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="isAnonymous" th:field="*{isAnonymous}">
                                <label class="form-check-label" for="isAnonymous">
                                    Khảo sát ẩn danh (không lưu thông tin người trả lời)
                                </label>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="isActive" th:field="*{isActive}">
                                <label class="form-check-label" for="isActive">
                                    Kích hoạt khảo sát
                                </label>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save me-1"></i>Lưu
                                </button>
                                <a href="/engagement/admin/surveys" class="btn btn-secondary">
                                    <i class="bi bi-x-circle me-1"></i>Hủy
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
