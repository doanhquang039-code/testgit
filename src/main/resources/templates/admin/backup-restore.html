<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Backup & Restore - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/admin-sidebar :: sidebar"></div>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-cloud-arrow-down me-2"></i>Backup & Restore</h1>
                    <div class="btn-toolbar">
                        <form method="post" action="/admin/backup/create-full" class="me-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-cloud-arrow-down me-1"></i>Create Full Backup
                            </button>
                        </form>
                        <form method="post" action="/admin/backup/create-database">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-database me-1"></i>Create DB Backup
                            </button>
                        </form>
                    </div>
                </div>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Statistics -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 th:text="${backupStats.totalBackups}">15</h3>
                                <p class="text-muted mb-0">Total Backups</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 class="text-success" th:text="${backupStats.completedBackups}">14</h3>
                                <p class="text-muted mb-0">Completed</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 class="text-danger" th:text="${backupStats.failedBackups}">1</h3>
                                <p class="text-muted mb-0">Failed</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3 th:text="${#numbers.formatDecimal(backupStats.totalSize / 1024 / 1024, 1, 2)} + ' MB'">250 MB</h3>
                                <p class="text-muted mb-0">Total Size</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Backups Table -->
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>Size</th>
                                    <th>Status</th>
                                    <th>Created By</th>
                                    <th>Created At</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="backup : ${backups}">
                                    <td th:text="${backup.id}">1</td>
                                    <td th:text="${backup.backupName}">backup.zip</td>
                                    <td><span class="badge bg-info" th:text="${backup.backupType}">FULL</span></td>
                                    <td th:text="${#numbers.formatDecimal(backup.fileSize / 1024 / 1024, 1, 2)} + ' MB'">25 MB</td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${backup.status == 'COMPLETED'} ? 'bg-success' : (${backup.status == 'FAILED'} ? 'bg-danger' : 'bg-warning')"
                                              th:text="${backup.status}">COMPLETED</span>
                                    </td>
                                    <td th:text="${backup.createdBy}">admin</td>
                                    <td th:text="${#temporals.format(backup.createdAt, 'dd/MM/yyyy HH:mm')}">30/04/2026 10:30</td>
                                    <td>
                                        <a th:href="@{/admin/backup/download/{id}(id=${backup.id})}" class="btn btn-sm btn-primary">
                                            <i class="bi bi-download"></i>
                                        </a>
                                        <form method="post" th:action="@{/admin/backup/restore/{id}(id=${backup.id})}" style="display:inline;">
                                            <input type="hidden" name="confirmed" value="true">
                                            <button type="submit" class="btn btn-sm btn-warning" 
                                                    onclick="return confirm('Are you sure you want to restore from this backup?')">
                                                <i class="bi bi-arrow-counterclockwise"></i>
                                            </button>
                                        </form>
                                        <form method="post" th:action="@{/admin/backup/delete/{id}(id=${backup.id})}" style="display:inline;">
                                            <button type="submit" class="btn btn-sm btn-danger" 
                                                    onclick="return confirm('Are you sure you want to delete this backup?')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
