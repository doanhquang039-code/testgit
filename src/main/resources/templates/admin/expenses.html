<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Chi phí - HR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .expense-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .expense-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-approved { background: #d1e7dd; color: #0f5132; }
        .status-rejected { background: #f8d7da; color: #842029; }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Include sidebar -->
            <div th:replace="fragments/admin-sidebar :: sidebar"></div>
            
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-receipt me-2 text-primary"></i>Quản lý Chi phí</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
                            <i class="bi bi-plus-circle me-1"></i>Thêm chi phí mới
                        </button>
                    </div>
                </div>

                <!-- Statistics -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="stats-card">
                            <h3 th:text="${expenses != null ? #lists.size(expenses) : 0}">0</h3>
                            <p class="mb-0">Tổng yêu cầu</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stats-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <h3>0</h3>
                            <p class="mb-0">Chờ duyệt</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stats-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                            <h3>0</h3>
                            <p class="mb-0">Đã duyệt</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stats-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                            <h3>0 VND</h3>
                            <p class="mb-0">Tổng chi phí</p>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="card mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="bi bi-funnel me-2"></i>Bộ lọc</h5>
                    </div>
                    <div class="card-body">
                        <form method="get" class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">Trạng thái</label>
                                <select name="status" class="form-select">
                                    <option value="">Tất cả</option>
                                    <option value="PENDING">Chờ duyệt</option>
                                    <option value="APPROVED">Đã duyệt</option>
                                    <option value="REJECTED">Từ chối</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Từ ngày</label>
                                <input type="date" name="startDate" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Đến ngày</label>
                                <input type="date" name="endDate" class="form-control">
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary me-2">
                                    <i class="bi bi-search me-1"></i>Lọc
                                </button>
                                <a href="/admin/expenses" class="btn btn-outline-secondary">Đặt lại</a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Expense List -->
                <div th:if="${expenses == null or #lists.isEmpty(expenses)}" class="text-center py-5">
                    <i class="bi bi-receipt" style="font-size: 4rem; color: #dee2e6;"></i>
                    <p class="text-muted mt-3 mb-3">Chưa có yêu cầu chi phí nào</p>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
                        <i class="bi bi-plus-circle me-1"></i>Tạo yêu cầu đầu tiên
                    </button>
                </div>

                <div th:each="expense : ${expenses}" class="expense-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <h5 class="mb-2" th:text="${expense.description}">Mô tả chi phí</h5>
                            <div class="d-flex gap-3 text-muted small mb-2">
                                <span><i class="bi bi-person me-1"></i><span th:text="${expense.user.fullName}">Nhân viên</span></span>
                                <span><i class="bi bi-calendar me-1"></i><span th:text="${expense.expenseDate}">01/01/2024</span></span>
                                <span><i class="bi bi-tag me-1"></i><span th:text="${expense.category}">Danh mục</span></span>
                            </div>
                            <div class="d-flex gap-2 align-items-center">
                                <span class="badge status-badge status-pending" th:if="${expense.status == 'PENDING'}">
                                    <i class="bi bi-clock me-1"></i>Chờ duyệt
                                </span>
                                <span class="badge status-badge status-approved" th:if="${expense.status == 'APPROVED'}">
                                    <i class="bi bi-check-circle me-1"></i>Đã duyệt
                                </span>
                                <span class="badge status-badge status-rejected" th:if="${expense.status == 'REJECTED'}">
                                    <i class="bi bi-x-circle me-1"></i>Từ chối
                                </span>
                            </div>
                        </div>
                        <div class="text-end">
                            <h4 class="text-primary mb-2" th:text="${#numbers.formatDecimal(expense.amount, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</h4>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-primary" th:if="${expense.status == 'PENDING'}">
                                    <i class="bi bi-check"></i> Duyệt
                                </button>
                                <button class="btn btn-outline-danger" th:if="${expense.status == 'PENDING'}">
                                    <i class="bi bi-x"></i> Từ chối
                                </button>
                                <button class="btn btn-outline-secondary">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Expense Modal -->
    <div class="modal fade" id="addExpenseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm chi phí mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Nhân viên</label>
                            <select class="form-select" required>
                                <option value="">Chọn nhân viên</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số tiền</label>
                            <input type="number" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Danh mục</label>
                            <select class="form-select" required>
                                <option value="">Chọn danh mục</option>
                                <option value="TRAVEL">Đi lại</option>
                                <option value="MEAL">Ăn uống</option>
                                <option value="OFFICE">Văn phòng</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ngày chi</label>
                            <input type="date" class="form-control" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
