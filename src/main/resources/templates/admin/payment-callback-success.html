<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán Thành công - HRMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .payment-details {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
        }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h2 class="mb-3">Thanh toán thành công!</h2>
        <p class="text-muted mb-4" th:text="${success}"></p>
        
        <div class="payment-details" th:if="${payment}">
            <p><strong>Nhân viên:</strong> <span th:text="${payment.user.fullName}"></span></p>
            <p><strong>Số tiền:</strong> <span th:text="${#numbers.formatCurrency(payment.amount)}"></span></p>
            <p><strong>Mã giao dịch:</strong> <code th:text="${payment.transactionId}"></code></p>
            <p><strong>Ngày:</strong> <span th:text="${#dates.format(payment.paymentDate, 'dd/MM/yyyy HH:mm:ss')}"></span></p>
        </div>
        
        <div class="d-grid gap-2">
            <a th:href="@{/admin/payments}" class="btn btn-primary btn-lg">
                ← Quay lại Danh sách thanh toán
            </a>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">
                🏠 Về Dashboard
            </a>
        </div>
    </div>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-search.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
