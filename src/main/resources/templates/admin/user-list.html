<div class="container-fluid py-4">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="text-primary mb-0 fw-bold">
                <i class="bi bi-people-fill me-2"></i>QUẢN LÝ NHÂN VIÊN
            </h5>
            <a th:href="@{/admin/users/add}" class="btn btn-primary shadow-sm px-3">
                <i class="bi bi-plus-lg me-1"></i> Thêm nhân viên mới
            </a>
        </div>
        <div class="card-header bg-white py-3">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <form th:action="@{/admin/users}" method="get" class="d-flex">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control me-2"
                            placeholder="Nhập tên nhân viên cần tìm...">
                        <button type="submit" class="btn btn-primary">Tìm kiếm</button>
                    </form>
                </div>
                <div class="col-md-6 text-end">
                    <a th:href="@{/admin/users/export/excel}" class="btn btn-outline-success border-2 fw-bold">
                        <i class="bi bi-file-earmark-excel"></i> Xuất Excel
                    </a>
                    <a th:href="@{/admin/users/export/pdf}" class="btn btn-outline-danger border-2 fw-bold">
                        <i class="bi bi-file-earmark-pdf"></i> Xuất PDF
                    </a>
                    <a th:href="@{/admin/users/add}" class="btn btn-success fw-bold">➕ Thêm nhân viên</a>
                </div>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4 border-0 text-uppercase small fw-bold">Nhân viên</th>
                            <th class="border-0 text-uppercase small fw-bold">Tài khoản</th>
                            <th class="border-0 text-uppercase small fw-bold">Phòng ban</th>
                            <th class="border-0 text-uppercase small fw-bold">Chức vụ</th>
                            <th class="border-0 text-uppercase small fw-bold text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <img th:src="@{${u.profileImage != null ? '/test1/' + u.profileImage : '/test1/default_avatar.png'}}"
                                        class="rounded-circle shadow-sm border border-2 border-white"
                                        style="width: 48px; height: 48px; object-fit: cover;">
                                    <div class="ms-3">
                                        <div class="fw-bold text-dark" th:text="${u.fullName}"></div>
                                        <div class="text-muted small" th:text="${u.email}"></div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="badge rounded-pill bg-info text-dark bg-opacity-10 px-3"
                                    th:text="${u.username}"></span>
                            </td>
                            <td>
                                <div class="text-dark"
                                    th:text="${u.department != null ? u.department.departmentName : '---'}"></div>
                            </td>
                            <td>
                                <span class="badge bg-primary bg-opacity-10 text-primary px-3"
                                    th:text="${u.position != null ? u.position.positionName : '---'}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm" role="group">
                                    <a th:href="@{/admin/users/edit/{id}(id=${u.id})}"
                                        class="btn btn-white btn-sm text-warning border-end" title="Chỉnh sửa">
                                        <i class="bi bi-pencil-square"></i> Sửa
                                    </a>
                                    <a th:href="@{/admin/users/delete/{id}(id=${u.id})}"
                                        class="btn btn-white btn-sm text-danger"
                                        onclick="return confirm('Bạn có chắc muốn ẩn nhân viên này?')" title="Xóa">
                                        <i class="bi bi-trash"></i> Xóa
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white border-0 py-3">
            <small class="text-muted">Hiển thị tổng cộng <span th:text="${users.size()}"></span> nhân viên đang hoạt
                động.</small>
        </div>
    </div>
</div>
