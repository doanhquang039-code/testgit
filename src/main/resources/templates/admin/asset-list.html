<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài sản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container-fluid mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-pc-display"></i> Quản lý Tài sản Công ty</h2>
        <div>
            <a th:href="@{/admin/assets/assignments}" class="btn btn-info text-white"><i class="bi bi-list-check"></i> Lịch sử Cấp phát</a>
            <a th:href="@{/admin/assets/add}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Thêm Tài sản</a>
        </div>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form th:action="@{/admin/assets}" method="get" class="mb-3 d-flex gap-2">
                <input type="text" name="keyword" class="form-control w-25" placeholder="Tìm tên, mã tài sản..." th:value="${keyword}">
                <button type="submit" class="btn btn-secondary"><i class="bi bi-search"></i> Tìm kiếm</button>
                <a th:href="@{/admin/assets}" class="btn btn-light" th:if="${keyword != null}">Xóa lọc</a>
            </form>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Mã TS</th>
                            <th>Tên Tài sản</th>
                            <th>Danh mục</th>
                            <th>Ngày mua</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="asset : ${assets}">
                            <td class="fw-bold" th:text="${asset.assetCode}"></td>
                            <td th:text="${asset.assetName}"></td>
                            <td th:text="${asset.category}"></td>
                            <td th:text="${#temporals.format(asset.purchaseDate, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span class="badge bg-success" th:if="${asset.status.name() == 'AVAILABLE'}">Sẵn sàng</span>
                                <span class="badge bg-warning text-dark" th:if="${asset.status.name() == 'ASSIGNED'}">Đang sử dụng</span>
                                <span class="badge bg-danger" th:if="${asset.status.name() == 'BROKEN'}">Hỏng</span>
                                <span class="badge bg-secondary" th:if="${asset.status.name() == 'MAINTENANCE'}">Bảo trì</span>
                            </td>
                            <td class="text-center">
                                <a th:if="${asset.status.name() == 'AVAILABLE'}" th:href="@{/admin/assets/assign(assetId=${asset.id})}" class="btn btn-sm btn-success" title="Cấp phát cho NV"><i class="bi bi-person-plus"></i> Cấp phát</a>
                                <a th:href="@{/admin/assets/edit/{id}(id=${asset.id})}" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/assets/delete/{id}(id=${asset.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa tài sản này?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(assets)}">
                            <td colspan="6" class="text-center text-muted py-4">Không tìm thấy tài sản nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
