<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Khảo sát - HR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Include sidebar -->
            <div th:replace="fragments/admin-sidebar :: sidebar"></div>
            
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-clipboard-data me-2"></i>Quản lý Khảo sát</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a href="/engagement/admin/surveys/create" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-1"></i>Tạo khảo sát mới
                        </a>
                    </div>
                </div>

                <!-- Flash messages -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Stats Cards -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card text-white bg-primary">
                            <div class="card-body">
                                <h5 class="card-title">Tổng khảo sát</h5>
                                <h2 class="mb-0" th:text="${stats != null ? stats.totalSurveys : 0}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-success">
                            <div class="card-body">
                                <h5 class="card-title">Đang hoạt động</h5>
                                <h2 class="mb-0" th:text="${stats != null ? stats.activeSurveys : 0}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-info">
                            <div class="card-body">
                                <h5 class="card-title">Tổng phản hồi</h5>
                                <h2 class="mb-0" th:text="${stats != null ? stats.totalResponses : 0}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-warning">
                            <div class="card-body">
                                <h5 class="card-title">Tỷ lệ tham gia</h5>
                                <h2 class="mb-0" th:text="${stats != null ? stats.participationRate + '%' : '0%'}">0%</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Surveys Table -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Danh sách khảo sát</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Tiêu đề</th>
                                        <th>Ngày bắt đầu</th>
                                        <th>Ngày kết thúc</th>
                                        <th>Trạng thái</th>
                                        <th>Phản hồi</th>
                                        <th>Ẩn danh</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="survey : ${surveys}">
                                        <td th:text="${survey.id}">1</td>
                                        <td th:text="${survey.title}">Khảo sát hài lòng Q1</td>
                                        <td th:text="${#temporals.format(survey.startDate, 'dd/MM/yyyy')}">01/01/2024</td>
                                        <td th:text="${#temporals.format(survey.endDate, 'dd/MM/yyyy')}">31/01/2024</td>
                                        <td>
                                            <span th:if="${survey.isActive}" class="badge bg-success">Hoạt động</span>
                                            <span th:unless="${survey.isActive}" class="badge bg-secondary">Đã đóng</span>
                                        </td>
                                        <td th:text="${survey.responseCount}">25</td>
                                        <td>
                                            <i th:if="${survey.isAnonymous}" class="bi bi-check-circle text-success"></i>
                                            <i th:unless="${survey.isAnonymous}" class="bi bi-x-circle text-danger"></i>
                                        </td>
                                        <td>
                                            <a th:href="@{/engagement/admin/surveys/{id}(id=${survey.id})}" class="btn btn-sm btn-info" title="Xem chi tiết">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                            <a th:href="@{/engagement/admin/surveys/{id}/edit(id=${survey.id})}" class="btn btn-sm btn-warning" title="Sửa">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <form th:action="@{/engagement/admin/surveys/{id}/delete(id=${survey.id})}" method="post" style="display:inline;">
                                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc muốn xóa khảo sát này?')" title="Xóa">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(surveys)}">
                                        <td colspan="8" class="text-center text-muted">Chưa có khảo sát nào</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
