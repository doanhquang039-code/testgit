<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhân viên phòng ban</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3 class="mb-1" th:text="'Nhân viên phòng: ' + ${department.departmentName}">Nhân viên phòng</h3>
            <div class="text-muted">Xem danh sách nhân viên theo phòng ban.</div>
        </div>
        <a th:href="@{/admin/departments}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Quay lại phòng ban
        </a>
    </div>

    <form method="get" class="card card-body mb-3">
        <div class="row g-2">
            <div class="col-md-6">
                <label class="form-label">Từ khóa</label>
                <input type="text" name="keyword" class="form-control" th:value="${keyword}" placeholder="Tên, email, mã nhân viên...">
            </div>
            <div class="col-md-4">
                <label class="form-label">Vai trò</label>
                <select name="role" class="form-select">
                    <option value="">Tất cả</option>
                    <option value="ADMIN" th:selected="${selectedRole == 'ADMIN'}">Admin</option>
                    <option value="MANAGER" th:selected="${selectedRole == 'MANAGER'}">Manager</option>
                    <option value="HIRING" th:selected="${selectedRole == 'HIRING'}">Hiring</option>
                    <option value="USER" th:selected="${selectedRole == 'USER'}">User</option>
                </select>
            </div>
            <div class="col-md-2 d-grid align-items-end">
                <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Lọc</button>
            </div>
        </div>
    </form>

    <div class="card">
        <div class="card-header d-flex justify-content-between">
            <strong>Danh sách nhân viên</strong>
            <span th:text="${#lists.size(members)} + ' nhân viên'">0 nhân viên</span>
        </div>
        <div class="table-responsive">
            <table class="table table-striped mb-0">
                <thead>
                <tr>
                    <th>Mã NV</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Chức vụ</th>
                    <th>Vai trò</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(members)}">
                    <td colspan="5" class="text-center text-muted py-4">Không có dữ liệu phù hợp.</td>
                </tr>
                <tr th:each="m : ${members}">
                    <td th:text="${m.employeeCode != null ? m.employeeCode : '---'}">E001</td>
                    <td th:text="${m.fullName}">User</td>
                    <td th:text="${m.email != null ? m.email : '---'}">mail@example.com</td>
                    <td th:text="${m.position != null ? m.position.positionName : '---'}">Position</td>
                    <td><span class="badge text-bg-secondary" th:text="${m.role != null ? m.role.name() : '---'}">USER</span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
