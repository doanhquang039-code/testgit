<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KPI Goal Form - HRMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f4f8; }
        .sidebar { width: 240px; height: 100vh; position: fixed; left: 0; top: 0; background: linear-gradient(180deg, #0f172a, #1e293b); z-index: 100; overflow-y: auto; }
        .sidebar-logo { font-size: 1rem; font-weight: 700; color: white; text-align: center; padding: 18px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar a { color: #a0aec0; text-decoration: none; display: flex; align-items: center; gap: 10px; padding: 10px 20px; transition: all .2s; border-left: 3px solid transparent; font-size: 0.85rem; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,.08); color: white; border-left-color: #f59e0b; }
        .sidebar a i { width: 18px; }
        .sidebar hr { border-color: rgba(255,255,255,0.08); margin: 6px 16px; }
        .sidebar form { padding: 12px 16px 16px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 8px; }
        .main { margin-left: 240px; padding: 28px 32px; }
        .form-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; max-width: 760px; }
        .form-card-header { background: linear-gradient(135deg, #f59e0b, #f97316); padding: 22px 28px; color: white; }
        .form-card-header h5 { font-weight: 700; margin: 0; }
        .form-card-body { padding: 28px; }
        .form-label { font-weight: 600; color: #374151; font-size: 0.85rem; }
        .form-control, .form-select { border-radius: 10px; border: 1.5px solid #e5e7eb; padding: 10px 14px; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .btn-save { background: linear-gradient(135deg, #f59e0b, #f97316); border: none; color: white; padding: 12px 28px; border-radius: 12px; font-weight: 600; }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">⚡ HRMS ADMIN</div>
    <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Nhân viên</a>
    <a th:href="@{/admin/kpi}" class="active"><i class="bi bi-bullseye"></i> KPI Goals</a>
    <a th:href="@{/admin/expenses}"><i class="bi bi-receipt"></i> Chi phí</a>
    <a th:href="@{/admin/skills}"><i class="bi bi-mortarboard"></i> Kỹ năng</a>
    <hr/>
          <!-- Language Toggle -->
          <div class="lang-toggle-wrap" style="padding:8px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;">
            <div class="lang-toggle" style="display:flex;align-items:center;gap:6px;justify-content:center;">
              <button class="lang-btn" data-lang="vi"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127475;&#127483; VI
              </button>
              <span style="color:rgba(255,255,255,0.2);font-size:0.7rem;">|</span>
              <button class="lang-btn" data-lang="en"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127468;&#127463; EN
              </button>
            </div>
          </div>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
    </form>
</div>

<div class="main">
    <div class="mb-3">
        <a th:href="@{/admin/kpi}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Quay lại
        </a>
    </div>
    <div class="form-card">
        <div class="form-card-header">
            <h5><i class="bi bi-bullseye me-2"></i>
                <span th:text="${goal.id != null ? 'Chỉnh sửa KPI Goal' : 'Tạo KPI Goal mới'}"></span>
            </h5>
        </div>
        <div class="form-card-body">
            <form th:action="@{/admin/kpi/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="id" th:value="${goal.id}"/>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nhân viên <span class="text-danger">*</span></label>
                        <select name="userId" class="form-select" required>
                            <option value="">-- Chọn nhân viên --</option>
                            <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName}"
                                    th:selected="${goal.user != null and goal.user.id == u.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phòng ban</label>
                        <select name="departmentId" class="form-select">
                            <option value="">-- Không chọn --</option>
                            <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.departmentName}"
                                    th:selected="${goal.department != null and goal.department.id == d.id}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Tiêu đề KPI <span class="text-danger">*</span></label>
                        <input type="text" name="goalTitle" class="form-control" required
                               th:value="${goal.goalTitle}" placeholder="VD: Hoàn thành 10 task trong tháng"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Mô tả</label>
                        <textarea name="description" class="form-control" rows="3"
                                  th:text="${goal.description}" placeholder="Mô tả chi tiết mục tiêu..."></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Danh mục</label>
                        <select name="category" class="form-select">
                            <option value="INDIVIDUAL" th:selected="${goal.category == 'INDIVIDUAL'}">Cá nhân</option>
                            <option value="TEAM" th:selected="${goal.category == 'TEAM'}">Nhóm</option>
                            <option value="DEPARTMENT" th:selected="${goal.category == 'DEPARTMENT'}">Phòng ban</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Giá trị mục tiêu <span class="text-danger">*</span></label>
                        <input type="number" name="targetValue" class="form-control" required step="0.01" min="0"
                               th:value="${goal.targetValue}"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Đơn vị</label>
                        <input type="text" name="unit" class="form-control"
                               th:value="${goal.unit}" placeholder="%, task, VND..."/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Giá trị hiện tại</label>
                        <input type="number" name="currentValue" class="form-control" step="0.01" min="0"
                               th:value="${goal.currentValue != null ? goal.currentValue : 0}"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Trọng số (0-1)</label>
                        <input type="number" name="weight" class="form-control" step="0.1" min="0" max="1"
                               th:value="${goal.weight != null ? goal.weight : 1.0}"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Trạng thái</label>
                        <select name="status" class="form-select">
                            <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}"
                                    th:selected="${goal.status == s}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ngày bắt đầu <span class="text-danger">*</span></label>
                        <input type="date" name="startDate" class="form-control" required
                               th:value="${goal.startDate}"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ngày kết thúc <span class="text-danger">*</span></label>
                        <input type="date" name="endDate" class="form-control" required
                               th:value="${goal.endDate}"/>
                    </div>
                    <div class="col-12 d-flex gap-2 mt-2">
                        <button type="submit" class="btn-save btn">
                            <i class="bi bi-check-lg me-2"></i>Lưu KPI Goal
                        </button>
                        <a th:href="@{/admin/kpi}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-search.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
