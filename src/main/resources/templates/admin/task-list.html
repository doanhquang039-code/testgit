<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3">
        <div class="row align-items-center">
            <div class="col-md-6">
                <form th:action="@{/admin/tasks}" method="get" class="d-flex">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control me-2"
                        placeholder="Tìm tên công việc...">
                    <button type="submit" class="btn btn-primary">Tìm</button>
                </form>
            </div>
            <div class="col-md-6 text-end">
                <a th:href="@{/admin/tasks/add}" class="btn btn-success">➕ Thêm công việc</a>
            </div>
        </div>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0 text-center">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th class="text-start">Tên công việc</th>
                    <th>Loại</th>
                    <th>Số người tối đa</th>
                    <th>Lương cơ bản</th>
                    <th>Tăng ca</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${tasks}">
                    <td th:text="${t.id}"></td>
                    <td class="text-start fw-bold" th:text="${t.taskName}"></td>
                    <td th:text="${t.taskType}"></td>
                    <td th:text="${t.maxParticipants}"></td>
                    <td th:text="${#numbers.formatCurrency(t.baseReward)}"></td>
                    <td>
                        <span th:class="${t.isExtraShift ? 'badge bg-warning' : 'badge bg-secondary'}"
                            th:text="${t.isExtraShift ? 'Có' : 'Không'}"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/tasks/edit/{id}(id=${t.id})}" class="btn btn-sm btn-warning">Sửa</a>
                        <a th:href="@{/admin/tasks/delete/{id}(id=${t.id})}" class="btn btn-sm btn-danger"
                            onclick="return confirm('Xóa việc này?')">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
