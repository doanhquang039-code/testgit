<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>System Monitor - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/admin-sidebar :: sidebar"></div>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-activity me-2"></i>System Monitor</h1>
                    <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()">
                        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                    </button>
                </div>

                <!-- System Health -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <i class="bi bi-cpu fs-1 text-primary"></i>
                                <h3 class="mt-2" th:text="${systemHealth.cpuUsage + '%'}">45%</h3>
                                <p class="text-muted mb-0">CPU Usage</p>
                                <div class="progress mt-2" style="height: 5px;">
                                    <div class="progress-bar" th:style="'width: ' + ${systemHealth.cpuUsage} + '%'"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <i class="bi bi-memory fs-1 text-warning"></i>
                                <h3 class="mt-2" th:text="${systemHealth.memoryUsage + '%'}">68%</h3>
                                <p class="text-muted mb-0">Memory Usage</p>
                                <div class="progress mt-2" style="height: 5px;">
                                    <div class="progress-bar bg-warning" th:style="'width: ' + ${systemHealth.memoryUsage} + '%'"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <i class="bi bi-hdd fs-1 text-info"></i>
                                <h3 class="mt-2" th:text="${systemHealth.diskUsage + '%'}">52%</h3>
                                <p class="text-muted mb-0">Disk Usage</p>
                                <div class="progress mt-2" style="height: 5px;">
                                    <div class="progress-bar bg-info" th:style="'width: ' + ${systemHealth.diskUsage} + '%'"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <i class="bi bi-check-circle fs-1 text-success"></i>
                                <h3 class="mt-2" th:text="${systemHealth.status}">Healthy</h3>
                                <p class="text-muted mb-0">System Status</p>
                                <small class="text-muted" th:text="'Uptime: ' + ${systemHealth.uptime}">Uptime: 15 days</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Performance Metrics -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-speedometer2 me-2"></i>Performance Metrics</h5>
                    </div>
                    <div class="card-body">
                        <table class="table">
                            <tbody>
                                <tr>
                                    <td><strong>Average Response Time</strong></td>
                                    <td th:text="${performanceMetrics.avgResponseTime + ' ms'}">150 ms</td>
                                </tr>
                                <tr>
                                    <td><strong>Requests Per Minute</strong></td>
                                    <td th:text="${performanceMetrics.requestsPerMinute}">120</td>
                                </tr>
                                <tr>
                                    <td><strong>Active Sessions</strong></td>
                                    <td th:text="${performanceMetrics.activeSessions}">45</td>
                                </tr>
                                <tr>
                                    <td><strong>Database Connections</strong></td>
                                    <td th:text="${performanceMetrics.dbConnections}">10</td>
                                </tr>
                                <tr>
                                    <td><strong>Cache Hit Rate</strong></td>
                                    <td th:text="${performanceMetrics.cacheHitRate + '%'}">85%</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-refresh every 30 seconds
        setTimeout(function() { location.reload(); }, 30000);
    </script>
</body>
</html>
