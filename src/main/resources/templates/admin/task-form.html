<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu mẫu công việc - HRMS Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f4f7fb; color: #0f172a; }
        .shell { max-width: 960px; margin: 0 auto; padding: 32px 18px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 18px; }
        .topbar h1 { margin: 0; font-size: 1.6rem; font-weight: 800; }
        .topbar p { margin: 6px 0 0; color: #64748b; }
        .form-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 10px 28px rgba(15,23,42,.06); overflow: hidden; }
        .form-card-header { padding: 18px 22px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; font-weight: 800; }
        .form-card-body { padding: 22px; }
        .form-label { font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; font-weight: 800; }
        .form-control, .form-select { border-radius: 10px; min-height: 44px; border-color: #dbe2ea; }
        .btn-soft { border-radius: 10px; font-weight: 700; min-height: 42px; }
    </style>
</head>
<body>
<main class="shell">
    <div class="topbar">
        <div>
            <h1 th:text="${task.id == null ? 'Thêm công việc' : 'Cập nhật công việc'}">Thêm công việc</h1>
            <p>Nhập khoảng thời gian cụ thể từ ngày nào đến ngày nào cho từng task.</p>
        </div>
        <a th:href="@{/admin/tasks}" class="btn btn-outline-secondary btn-soft">
            <i class="bi bi-arrow-left"></i> Quay lại
        </a>
    </div>

    <section class="form-card">
        <div class="form-card-header">
            <i class="bi bi-list-task me-2 text-info"></i>Thông tin công việc
        </div>
        <div class="form-card-body">
            <form th:action="@{/admin/tasks/save}" th:object="${task}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Tên công việc</label>
                        <input type="text" class="form-control" th:field="*{taskName}" placeholder="Ví dụ: Chuẩn bị báo cáo tháng" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Loại công việc</label>
                        <select class="form-select" th:field="*{taskType}" required>
                            <option value="">Chọn loại</option>
                            <option th:each="tt : ${taskTypes}" th:value="${tt.name()}" th:text="${tt.displayName}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Ngày bắt đầu</label>
                        <input type="date" class="form-control" th:field="*{startDate}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ngày kết thúc</label>
                        <input type="date" class="form-control" th:field="*{endDate}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Số người tối đa</label>
                        <input type="number" class="form-control" th:field="*{maxParticipants}" min="1" step="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Lương/thưởng cơ bản</label>
                        <input type="number" class="form-control" th:field="*{baseReward}" min="0" step="1000">
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" th:field="*{isExtraShift}">
                            <label class="form-check-label fw-semibold">Tính là tăng ca</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Mô tả</label>
                        <textarea class="form-control" th:field="*{description}" rows="5" placeholder="Mô tả yêu cầu, đầu ra cần bàn giao, ghi chú..."></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/admin/tasks}" class="btn btn-outline-secondary btn-soft">Hủy</a>
                    <button type="submit" class="btn btn-primary btn-soft">
                        <i class="bi bi-save"></i> Lưu công việc
                    </button>
                </div>
            </form>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
