<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Add Holiday</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #F3F4F6; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="row mb-4">
            <div class="col">
                <h1 class="h3 mb-0"><i class="bi bi-calendar-plus me-2"></i><span th:text="${pageTitle}">Add Holiday</span></h1>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/leave/admin/holidays/save}" method="post" th:object="${holiday}">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Holiday Name *</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Date *</label>
                            <input type="date" class="form-control" th:field="*{date}" required>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{isRecurring}">
                                <label class="form-check-label">
                                    Recurring (every year)
                                </label>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{isActive}" checked>
                                <label class="form-check-label">
                                    Active
                                </label>
                            </div>
                        </div>
                        
                        <div class="col-12">
                            <hr>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-2"></i>Save Holiday
                            </button>
                            <a href="/leave/admin/holidays" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
