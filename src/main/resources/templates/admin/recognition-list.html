<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Vinh danh - HR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
            
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-award me-2"></i>Quản lý Vinh danh & Khen thưởng</h1>
                </div>

                <!-- Stats Cards -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card text-white bg-primary">
                            <div class="card-body">
                                <h5 class="card-title">Tổng lượt vinh danh</h5>
                                <h2 class="mb-0" th:text="${stats != null ? stats.totalRecognitions : 0}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-success">
                            <div class="card-body">
                                <h5 class="card-title">Tháng này</h5>
                                <h2 class="mb-0" th:text="${stats != null ? stats.thisMonth : 0}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-warning">
                            <div class="card-body">
                                <h5 class="card-title">Tổng điểm thưởng</h5>
                                <h2 class="mb-0" th:text="${stats != null ? stats.totalPoints : 0}">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recognitions Table -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Danh sách vinh danh</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Người nhận</th>
                                        <th>Người tặng</th>
                                        <th>Loại</th>
                                        <th>Tiêu đề</th>
                                        <th>Điểm</th>
                                        <th>Công khai</th>
                                        <th>Ngày tạo</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="recognition : ${recognitions}">
                                        <td th:text="${recognition.id}">1</td>
                                        <td th:text="${recognition.recipient != null ? recognition.recipient.fullName : 'N/A'}">Nguyễn Văn A</td>
                                        <td th:text="${recognition.giver != null ? recognition.giver.fullName : 'N/A'}">Trần Thị B</td>
                                        <td>
                                            <span class="badge bg-info" th:text="${recognition.type}">EXCELLENCE</span>
                                        </td>
                                        <td th:text="${recognition.title}">Xuất sắc tháng 1</td>
                                        <td>
                                            <span class="badge bg-warning" th:text="${recognition.points}">10</span>
                                        </td>
                                        <td>
                                            <i th:if="${recognition.isPublic}" class="bi bi-check-circle text-success"></i>
                                            <i th:unless="${recognition.isPublic}" class="bi bi-x-circle text-danger"></i>
                                        </td>
                                        <td th:text="${#temporals.format(recognition.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2024 10:00</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(recognitions)}">
                                        <td colspan="8" class="text-center text-muted">Chưa có vinh danh nào</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
