<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách phân công công việc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-tasks me-2"></i>Quản lý phân công công việc</h2>
            <a th:href="@{/admin/assignments/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i> Giao việc mới
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nhân viên</th>
                            <th>Tên công việc</th>
                            <th>Ngày giao</th>
                            <th>Trạng thái</th>
                            <th>Số giờ thực tế</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${assignments}">
                            <td th:text="${a.id}"></td>
                            <td th:text="${a.user != null ? a.user.fullName : 'Chưa xác định'}"></td>
                            <td th:text="${a.task != null ? a.task.taskName : 'N/A'}"></td>
                            <td th:text="${#temporals.format(a.assignedDate, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span class="badge"
                                    th:classappend="${a.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-warning'}"
                                    th:text="${a.status}"></span>
                            </td>
                            <td th:text="${a.actualHours != null ? a.actualHours + 'h' : '0h'}"></td>
                            <td>
                                <a th:href="@{/admin/assignments/edit/{id}(id=${a.id})}"
                                    class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/admin/assignments/delete/{id}(id=${a.id})}" method="post"
                                    class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Bạn có chắc muốn xóa phân công này?')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(assignments)}">
                            <td colspan="7" class="text-center text-muted">Chưa có dữ liệu phân công nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-3">
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary text-white">Quay lại Dashboard</a>
        </div>
    </div>
</body>

</html>
