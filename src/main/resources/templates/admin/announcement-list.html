<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông báo công ty - Admin HRMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; margin: 0; }
        .sidebar { width: 240px; min-height: 100vh; position: fixed; left: 0; top: 0; background: linear-gradient(180deg, #0f172a, #1e293b); padding-top: 16px; }
        .sidebar a { color: #94a3b8; text-decoration: none; display: flex; gap: 8px; padding: 10px 18px; font-size: 0.85rem; }
        .sidebar a:hover, .sidebar a.active { color: white; background: rgba(255,255,255,.08); border-left: 3px solid #f59e0b; }
        .main { margin-left: 240px; padding: 28px 32px; }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="text-white text-center fw-bold py-3 small">⚡ HRMS ADMIN</div>
    <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/announcements}" class="active"><i class="bi bi-megaphone"></i> Thông báo công ty</a>
    <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Nhân viên</a>
    <a th:href="@{/admin/departments}"><i class="bi bi-building"></i> Phòng ban</a>
          <!-- Language Toggle -->
          <div class="lang-toggle-wrap" style="padding:8px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;">
            <div class="lang-toggle" style="display:flex;align-items:center;gap:6px;justify-content:center;">
              <button class="lang-btn" data-lang="vi"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127475;&#127483; VI
              </button>
              <span style="color:rgba(255,255,255,0.2);font-size:0.7rem;">|</span>
              <button class="lang-btn" data-lang="en"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127468;&#127463; EN
              </button>
            </div>
          </div>
    <form th:action="@{/logout}" method="post" class="px-3 mt-4">
        <button type="submit" class="btn btn-outline-light btn-sm w-100">Đăng xuất</button>
    </form>
</div>
<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-bold m-0">Thông báo nội bộ</h1>
        <a class="btn btn-primary" th:href="@{/admin/announcements/create}"><i class="bi bi-plus-lg"></i> Tạo mới</a>
    </div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="table-responsive bg-white rounded-3 shadow-sm">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th>Tiêu đề</th>
                <th>Phạm vi</th>
                <th>Ưu tiên</th>
                <th>Đăng</th>
                <th>Hiển thị</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${announcements}">
                <td th:text="${a.title}">—</td>
                <td th:text="${a.targetDepartment != null} ? ${a.targetDepartment.departmentName} : 'Toàn công ty'">—</td>
                <td><span class="badge bg-secondary" th:text="${a.priority}">NORMAL</span></td>
                <td class="small text-muted" th:text="${#temporals.format(a.publishedAt, 'dd/MM/yyyy HH:mm')}">—</td>
                <td><span th:class="${a.active} ? 'badge bg-success' : 'badge bg-secondary'" th:text="${a.active} ? 'Bật' : 'Tắt'">—</span></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/announcements/{id}/edit(id=${a.id})}">Sửa</a>
                    <form th:action="@{/admin/announcements/{id}/delete(id=${a.id})}" method="post" class="d-inline" onsubmit="return confirm('Xóa thông báo này?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger">Xóa</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(announcements)}">
                <td colspan="6" class="text-center text-muted py-4">Chưa có dữ liệu.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-search.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
