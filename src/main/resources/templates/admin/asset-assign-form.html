<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cấp phát Tài sản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Bàn giao Tài sản cho Nhân viên</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/assets/assign/save}" method="post" th:object="${assignment}">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Chọn Tài sản (*)</label>
                            <select class="form-select" name="assetId" required>
                                <option value="">-- Chọn tài sản có sẵn --</option>
                                <option th:each="a : ${assets}" 
                                        th:value="${a.id}" 
                                        th:text="${a.assetCode + ' - ' + a.assetName}"
                                        th:selected="${selectedAssetId == a.id}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Chọn Nhân viên (*)</label>
                            <select class="form-select" name="userId" required>
                                <option value="">-- Chọn nhân viên --</option>
                                <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName + ' (' + u.username + ')'}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Ngày bàn giao</label>
                            <input type="date" class="form-control" th:field="*{assignedDate}">
                            <small class="text-muted">Để trống sẽ tự động lấy ngày hôm nay.</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tình trạng lúc bàn giao</label>
                            <input type="text" class="form-control" th:field="*{conditionOnAssign}" placeholder="Vd: Mới 100%, Máy trầy nhẹ góc...">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Ghi chú thêm</label>
                            <textarea class="form-control" rows="2" th:field="*{notes}"></textarea>
                        </div>

                        <div class="text-end">
                            <a th:href="@{/admin/assets}" class="btn btn-secondary">Hủy bỏ</a>
                            <button type="submit" class="btn btn-success px-4">Bàn giao</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
