<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Kỹ Năng - HRMS Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f4f8; margin: 0; }
        .sidebar { width: 240px; height: 100vh; position: fixed; left: 0; top: 0; background: linear-gradient(180deg, #0f172a, #1e293b); z-index: 100; overflow-y: auto; }
        .sidebar-logo { font-size: 1rem; font-weight: 700; color: white; text-align: center; padding: 18px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar a { color: #a0aec0; text-decoration: none; display: flex; align-items: center; gap: 10px; padding: 10px 20px; transition: all .2s; border-left: 3px solid transparent; font-size: 0.85rem; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,.08); color: white; border-left-color: #f59e0b; }
        .sidebar a i { width: 18px; }
        .sidebar hr { border-color: rgba(255,255,255,0.08); margin: 6px 16px; }
        .sidebar form { padding: 12px 16px 16px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 8px; }
        .main { margin-left: 240px; padding: 28px 32px; padding-bottom: 60px; }
        .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        .page-header h1 { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin: 0; }
        .filter-card { background: white; border-radius: 14px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .table-card { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden; }
        .tc-head { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .tc-head h6 { font-weight: 700; margin: 0; color: #0f172a; }
        .data-table th { background: #f8fafc; color: #64748b; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border: none; padding: 11px 16px; }
        .data-table td { padding: 12px 16px; font-size: 0.85rem; border-color: #f1f5f9; vertical-align: middle; }
        .data-table tr:hover td { background: #fafcff; }
        .emp-cell { display: flex; align-items: center; gap: 10px; }
        .emp-av { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.78rem; flex-shrink: 0; }
        .level-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
        .level-BEGINNER { background: #f1f5f9; color: #64748b; }
        .level-INTERMEDIATE { background: #dbeafe; color: #1e40af; }
        .level-ADVANCED { background: #d1fae5; color: #065f46; }
        .level-EXPERT { background: #fef3c7; color: #92400e; }
        .btn-sm-action { border-radius: 7px; padding: 4px 10px; font-size: 0.75rem; font-weight: 600; text-decoration: none; display: inline-block; border: 1px solid; }
        .cat-tag { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; background: #ede9fe; color: #6366f1; }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">⚡ HRMS ADMIN</div>
    <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Nhân viên</a>
    <a th:href="@{/admin/kpi}"><i class="bi bi-bullseye"></i> KPI Goals</a>
    <a th:href="@{/admin/expenses}"><i class="bi bi-receipt"></i> Chi phí</a>
    <a th:href="@{/admin/skills}" class="active"><i class="bi bi-mortarboard"></i> Kỹ năng</a>
    <a th:href="@{/admin/reviews}"><i class="bi bi-star-half"></i> Đánh giá</a>
    <a th:href="@{/admin/reports}"><i class="bi bi-bar-chart-line"></i> Báo cáo</a>
    <hr/>
          <!-- Language Toggle -->
          <div class="lang-toggle-wrap" style="padding:8px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;">
            <div class="lang-toggle" style="display:flex;align-items:center;gap:6px;justify-content:center;">
              <button class="lang-btn" data-lang="vi"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127475;&#127483; VI
              </button>
              <span style="color:rgba(255,255,255,0.2);font-size:0.7rem;">|</span>
              <button class="lang-btn" data-lang="en"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127468;&#127463; EN
              </button>
            </div>
          </div>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
    </form>
</div>

<div class="main">
    <div class="page-header">
        <div>
            <h1><i class="bi bi-mortarboard me-2 text-warning"></i>Quản Lý Kỹ Năng</h1>
            <div style="color:#64748b;font-size:0.85rem;margin-top:4px;">Theo dõi kỹ năng và chứng chỉ nhân viên</div>
        </div>
        <a th:href="@{/admin/skills/add}" class="btn btn-warning text-dark fw-bold">
            <i class="bi bi-plus-lg me-1"></i>Thêm kỹ năng
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filter -->
    <div class="filter-card">
        <form th:action="@{/admin/skills}" method="get">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label style="font-size:0.8rem;color:#64748b;font-weight:600;" class="form-label">Nhân viên</label>
                    <select name="userId" class="form-select form-select-sm">
                        <option value="">-- Tất cả --</option>
                        <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName}"
                                th:selected="${u.id == selectedUserId}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label style="font-size:0.8rem;color:#64748b;font-weight:600;" class="form-label">Danh mục</label>
                    <select name="category" class="form-select form-select-sm">
                        <option value="">-- Tất cả --</option>
                        <option value="TECHNICAL" th:selected="${selectedCategory == 'TECHNICAL'}">Technical</option>
                        <option value="SOFT" th:selected="${selectedCategory == 'SOFT'}">Soft Skills</option>
                        <option value="LANGUAGE" th:selected="${selectedCategory == 'LANGUAGE'}">Ngôn ngữ</option>
                        <option value="MANAGEMENT" th:selected="${selectedCategory == 'MANAGEMENT'}">Quản lý</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-warning btn-sm text-dark w-100 fw-bold">
                        <i class="bi bi-search me-1"></i>Lọc
                    </button>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/admin/skills}" class="btn btn-outline-secondary btn-sm w-100">Reset</a>
                </div>
            </div>
        </form>
    </div>

    <!-- Table -->
    <div class="table-card">
        <div class="tc-head">
            <h6><i class="bi bi-list-ul me-2"></i>Danh Sách Kỹ Năng</h6>
            <span style="font-size:0.8rem;color:#94a3b8;" th:text="${skills.size()} + ' kỹ năng'"></span>
        </div>
        <div class="table-responsive">
            <table class="table data-table mb-0">
                <thead>
                    <tr>
                        <th>Nhân viên</th>
                        <th>Kỹ năng</th>
                        <th>Danh mục</th>
                        <th>Cấp độ</th>
                        <th>Kinh nghiệm</th>
                        <th>Chứng chỉ</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(skills)}">
                        <td colspan="7" style="text-align:center;padding:40px;color:#94a3b8;">
                            <i class="bi bi-inbox" style="font-size:2.5rem;display:block;margin-bottom:12px;"></i>
                            Không có kỹ năng nào
                        </td>
                    </tr>
                    <tr th:each="s : ${skills}">
                        <td>
                            <div class="emp-cell">
                                <div class="emp-av" th:text="${s.user != null ? #strings.substring(s.user.fullName,0,1) : 'N'}">N</div>
                                <div style="font-weight:600;font-size:0.85rem;" th:text="${s.user != null ? s.user.fullName : 'N/A'}"></div>
                            </div>
                        </td>
                        <td style="font-weight:600;" th:text="${s.skillName}"></td>
                        <td><span class="cat-tag" th:text="${s.skillCategory}"></span></td>
                        <td>
                            <span class="level-badge" th:classappend="' level-' + ${s.skillLevel.name()}"
                                  th:text="${s.skillLevel.name()}"></span>
                        </td>
                        <td th:text="${s.yearsExp != null ? s.yearsExp + ' năm' : '—'}"></td>
                        <td>
                            <span th:if="${s.isCertified}" style="color:#10b981;font-weight:600;font-size:0.82rem;">
                                🏅 <span th:text="${s.certificateName != null ? s.certificateName : 'Có chứng chỉ'}"></span>
                            </span>
                            <span th:unless="${s.isCertified}" style="color:#94a3b8;font-size:0.82rem;">—</span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/skills/edit/{id}(id=${s.id})}"
                                   class="btn-sm-action" style="background:#ede9fe;color:#7c3aed;border-color:#ddd6fe;">✏️</a>
                                <a th:href="@{/admin/skills/delete/{id}(id=${s.id})}"
                                   onclick="return confirm('Xóa kỹ năng này?')"
                                   class="btn-sm-action" style="background:#fee2e2;color:#dc2626;border-color:#fecaca;">🗑️</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-search.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
