<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Form Đánh Giá KPI - HRMS Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
    .sidebar { height: 100vh; background: linear-gradient(180deg, #1a1f2e 0%, #2d3748 100%); color: white; padding-top: 20px; position: sticky; top: 0; overflow-y: auto; }
    .sidebar a { color: #a0aec0; text-decoration: none; display: flex; align-items: center; gap: 10px; padding: 10px 20px; transition: all 0.2s; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); color: white; border-left: 3px solid #667eea; }
    .sidebar-logo { font-size: 1rem; font-weight: 700; letter-spacing: 2px; color: white; text-align: center; padding: 12px; }
    .score-display { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .range-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #6c757d; }
    input[type=range] { accent-color: #667eea; }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block sidebar shadow">
      <div class="sidebar-logo">⚡ HRMS ADMIN</div>
      <hr style="border-color: rgba(255,255,255,0.15)"/>
      <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Nhân viên</a>
      <a th:href="@{/admin/reviews}" class="active"><i class="bi bi-star-half"></i> Đánh giá KPI</a>
      <a th:href="@{/hiring}"><i class="bi bi-person-plus"></i> Tuyển dụng</a>
          <!-- Language Toggle -->
          <div class="lang-toggle-wrap" style="padding:8px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;">
            <div class="lang-toggle" style="display:flex;align-items:center;gap:6px;justify-content:center;">
              <button class="lang-btn" data-lang="vi"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127475;&#127483; VI
              </button>
              <span style="color:rgba(255,255,255,0.2);font-size:0.7rem;">|</span>
              <button class="lang-btn" data-lang="en"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127468;&#127463; EN
              </button>
            </div>
          </div>
      <form th:action="@{/logout}" method="post" class="px-3 mt-4">
        <button type="submit" class="btn btn-outline-light btn-sm w-100">
          <i class="bi bi-box-arrow-right"></i> Đăng xuất
        </button>
      </form>
    </nav>

    <main class="col-md-10 ms-sm-auto px-md-4 pt-4">
      <div class="d-flex justify-content-between align-items-center pb-2 mb-4 border-bottom">
        <div>
          <h1 class="h3 mb-0">
            <i class="bi bi-star-half text-warning me-2"></i>
            <span th:text="${review.id == null ? 'Thêm Đánh Giá KPI' : 'Chỉnh Sửa Đánh Giá KPI'}"></span>
          </h1>
        </div>
        <a th:href="@{/admin/reviews}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i> Quay lại
        </a>
      </div>

      <form th:action="@{/admin/reviews/save}" th:object="${review}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <div class="row">
          <!-- Left: Basic Info -->
          <div class="col-md-8">
            <div class="card border-0 shadow-sm mb-4">
              <div class="card-header bg-white border-0 pt-4 pb-2">
                <h5 class="mb-0"><i class="bi bi-person-badge me-2 text-primary"></i>Thông tin đánh giá</h5>
              </div>
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Nhân viên <span class="text-danger">*</span></label>
                    <select th:field="*{user.id}" class="form-select" required>
                      <option value="">-- Chọn nhân viên --</option>
                      <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName + ' (' + u.username + ')'}"></option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Kỳ đánh giá <span class="text-danger">*</span></label>
                    <select th:field="*{reviewPeriod}" class="form-select" required>
                      <option value="">-- Chọn kỳ --</option>
                      <option th:each="p : ${periods}" th:value="${p}" th:text="${p}"></option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Ngày đánh giá</label>
                    <input type="date" th:field="*{reviewDate}" class="form-control"/>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Trạng thái</label>
                    <select th:field="*{status}" class="form-select">
                      <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Scoring -->
            <div class="card border-0 shadow-sm mb-4">
              <div class="card-header bg-white border-0 pt-4 pb-2">
                <h5 class="mb-0"><i class="bi bi-bar-chart me-2 text-success"></i>Điểm đánh giá (0-100)</h5>
              </div>
              <div class="card-body">
                <!-- KPI Score -->
                <div class="mb-4">
                  <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label fw-semibold mb-0">🎯 Chỉ số KPI</label>
                    <span id="kpiVal" class="badge bg-primary px-3"></span>
                  </div>
                  <input type="range" class="form-range" min="0" max="100" step="1"
                         th:field="*{kpiScore}"
                         oninput="document.getElementById('kpiVal').textContent = this.value"/>
                  <div class="range-label"><span>0</span><span>50</span><span>100</span></div>
                </div>
                <!-- Attitude -->
                <div class="mb-4">
                  <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label fw-semibold mb-0">😊 Thái độ làm việc</label>
                    <span id="attVal" class="badge bg-info px-3"></span>
                  </div>
                  <input type="range" class="form-range" min="0" max="100" step="1"
                         th:field="*{attitudeScore}"
                         oninput="document.getElementById('attVal').textContent = this.value"/>
                  <div class="range-label"><span>0</span><span>50</span><span>100</span></div>
                </div>
                <!-- Teamwork -->
                <div class="mb-4">
                  <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label fw-semibold mb-0">🤝 Làm việc nhóm</label>
                    <span id="twVal" class="badge bg-success px-3"></span>
                  </div>
                  <input type="range" class="form-range" min="0" max="100" step="1"
                         th:field="*{teamworkScore}"
                         oninput="document.getElementById('twVal').textContent = this.value"/>
                  <div class="range-label"><span>0</span><span>50</span><span>100</span></div>
                </div>
              </div>
            </div>

            <!-- Comments -->
            <div class="card border-0 shadow-sm mb-4">
              <div class="card-header bg-white border-0 pt-4 pb-2">
                <h5 class="mb-0"><i class="bi bi-chat-text me-2 text-warning"></i>Nhận xét chi tiết</h5>
              </div>
              <div class="card-body">
                <div class="mb-3">
                  <label class="form-label fw-semibold">✅ Điểm mạnh</label>
                  <textarea th:field="*{strengths}" class="form-control" rows="3" placeholder="Những điểm nổi bật của nhân viên..."></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">📈 Cần cải thiện</label>
                  <textarea th:field="*{improvements}" class="form-control" rows="3" placeholder="Những điểm cần cải thiện..."></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">💬 Ghi chú khác</label>
                  <textarea th:field="*{comments}" class="form-control" rows="2" placeholder="Các ghi chú bổ sung..."></textarea>
                </div>
              </div>
            </div>
          </div>

          <!-- Right: Score Preview -->
          <div class="col-md-4">
            <div class="card border-0 shadow-sm mb-4" style="position: sticky; top: 20px;">
              <div class="card-body text-center py-5">
                <h6 class="text-muted text-uppercase fw-bold mb-3">Điểm tổng hợp</h6>
                <div class="score-display" id="overallDisplay">--</div>
                <div class="mt-2 mb-4" id="ratingLabel" style="font-size:1.1rem; font-weight:600;">---</div>
                <div class="progress mb-3" style="height: 12px; border-radius: 6px;">
                  <div class="progress-bar" id="overallBar" role="progressbar" style="width: 0%; transition: width 0.4s;"></div>
                </div>
                <p class="text-muted small">Điểm tổng = trung bình của 3 tiêu chí</p>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-save me-1"></i> Lưu đánh giá
          </button>
          <a th:href="@{/admin/reviews}" class="btn btn-outline-secondary px-4">Huỷ</a>
        </div>
      </form>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function updateOverall() {
    const kpi = parseFloat(document.querySelector('[name="kpiScore"]')?.value || 0);
    const att = parseFloat(document.querySelector('[name="attitudeScore"]')?.value || 0);
    const tw  = parseFloat(document.querySelector('[name="teamworkScore"]')?.value || 0);
    const overall = ((kpi + att + tw) / 3).toFixed(1);
    document.getElementById('overallDisplay').textContent = overall;
    document.getElementById('overallBar').style.width = overall + '%';

    let label = 'Yếu', color = 'bg-danger';
    if (overall >= 90) { label = '🏆 Xuất sắc'; color = 'bg-success'; }
    else if (overall >= 75) { label = '⭐ Tốt'; color = 'bg-primary'; }
    else if (overall >= 60) { label = '👍 Khá'; color = 'bg-info'; }
    else if (overall >= 50) { label = '📊 Trung bình'; color = 'bg-warning'; }
    else { label = '❌ Yếu'; color = 'bg-danger'; }

    document.getElementById('ratingLabel').textContent = label;
    const bar = document.getElementById('overallBar');
    bar.className = 'progress-bar ' + color;
  }

  function initSliders() {
    document.querySelectorAll('input[type="range"]').forEach(el => {
      el.addEventListener('input', updateOverall);
    });
    // Init badge values
    const kpiEl = document.querySelector('[name="kpiScore"]');
    const attEl = document.querySelector('[name="attitudeScore"]');
    const twEl  = document.querySelector('[name="teamworkScore"]');
    if (kpiEl) document.getElementById('kpiVal').textContent = kpiEl.value;
    if (attEl) document.getElementById('attVal').textContent = attEl.value;
    if (twEl)  document.getElementById('twVal').textContent  = twEl.value;
    updateOverall();
  }

  window.addEventListener('DOMContentLoaded', initSliders);
</script>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-search.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
