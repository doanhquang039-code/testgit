<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T?o khóa h?c - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header">
                        <h4><i class="fas fa-plus me-2"></i>T?o khóa h?c m?i</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/course/save}" method="post" th:object="${course}">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="mb-3">
                                <label class="form-label">Tiêu d? khóa h?c <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{title}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mô t?</label>
                                <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Danh m?c <span class="text-danger">*</span></label>
                                    <select class="form-select" th:field="*{category}" required>
                                        <option value="">-- Ch?n danh m?c --</option>
                                        <option value="TECHNICAL">K? thu?t</option>
                                        <option value="SOFT_SKILLS">K? nang m?m</option>
                                        <option value="COMPLIANCE">Tuân th?</option>
                                        <option value="LEADERSHIP">Lãnh d?o</option>
                                        <option value="SALES">Bán hàng</option>
                                        <option value="MANAGEMENT">Qu?n lı</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">C?p d? <span class="text-danger">*</span></label>
                                    <select class="form-select" th:field="*{level}" required>
                                        <option value="">-- Ch?n c?p d? --</option>
                                        <option value="BEGINNER">Co b?n</option>
                                        <option value="INTERMEDIATE">Trung c?p</option>
                                        <option value="ADVANCED">Nâng cao</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Gi?ng viên</label>
                                    <input type="text" class="form-control" th:field="*{instructor}">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Th?i lu?ng (phút)</label>
                                    <input type="number" class="form-control" th:field="*{durationMinutes}">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">URL hình ?nh</label>
                                <input type="text" class="form-control" th:field="*{thumbnailUrl}" 
                                       placeholder="https://example.com/image.jpg">
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{isActive}" id="isActive">
                                    <label class="form-check-label" for="isActive">
                                        Kích ho?t khóa h?c
                                    </label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{isMandatory}" id="isMandatory">
                                    <label class="form-check-label" for="isMandatory">
                                        Khóa h?c b?t bu?c
                                    </label>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a th:href="@{/admin/courses}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-2"></i>Quay l?i
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Luu khóa h?c
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
