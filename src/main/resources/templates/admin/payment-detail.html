<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Chi tiết thanh toán</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container py-4">
    <a th:href="@{/admin/payments}" class="btn btn-outline-secondary btn-sm mb-3">← Danh sách</a>
    <div class="card shadow-sm" th:if="${payment != null}">
        <div class="card-header fw-bold">Giao dịch #<span th:text="${payment.id}"></span></div>
        <div class="card-body">
            <p><strong>Nhân viên:</strong> <span th:text="${payment.user != null ? payment.user.fullName : '-'}"></span></p>
            <p><strong>Số tiền:</strong> <span th:text="${payment.amount}"></span> VND</p>
            <p><strong>Loại:</strong> <span th:text="${payment.paymentType}"></span></p>
            <p><strong>Phương thức:</strong> <span th:text="${payment.paymentMethod}"></span></p>
            <p><strong>Trạng thái:</strong> <span th:text="${payment.paymentStatus}"></span></p>
            <p th:if="${payment.transactionId != null}"><strong>Mã GD cổng:</strong> <code th:text="${payment.transactionId}"></code></p>
            <p th:if="${payment.notes != null}"><strong>Ghi chú:</strong> <span th:text="${payment.notes}"></span></p>
        </div>
    </div>
</div>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-search.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
