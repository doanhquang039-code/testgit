<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${announcement.id != null} ? 'Sửa thông báo' : 'Tạo thông báo'">Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f0f4f8; font-family: system-ui, sans-serif; }
        .sidebar { width: 220px; min-height: 100vh; position: fixed; left: 0; top: 0; background: #1e293b; padding: 16px 0; }
        .sidebar a { color: #94a3b8; text-decoration: none; display: block; padding: 8px 16px; font-size: 0.9rem; }
        .sidebar a:hover { color: white; }
        .main { margin-left: 220px; padding: 24px 32px; max-width: 720px; }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
    </style>
</head>
<body>
<div class="sidebar">
    <a th:href="@{/admin/announcements}" class="text-white fw-bold px-3 pb-3 d-block"><i class="bi bi-arrow-left"></i> Danh sách</a>
</div>
<div class="main">
    <h1 class="h4 fw-bold mb-4" th:text="${announcement.id != null} ? 'Sửa thông báo' : 'Tạo thông báo mới'">Form</h1>

    <form th:action="@{/admin/announcements}" method="post" class="bg-white p-4 rounded-3 shadow-sm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="id" th:if="${announcement.id != null}" th:value="${announcement.id}"/>

        <div class="mb-3">
            <label class="form-label">Tiêu đề</label>
            <input class="form-control" name="title" required maxlength="255"
                   th:value="${announcement.title}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Nội dung</label>
            <textarea class="form-control" name="content" rows="8" required th:text="${announcement.content}"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Phòng ban nhận (để trống = toàn công ty)</label>
            <select class="form-select" name="departmentId">
                <option value="">— Toàn công ty —</option>
                <option th:each="d : ${departments}"
                        th:value="${d.id}"
                        th:selected="${announcement.targetDepartment != null and announcement.targetDepartment.id == d.id}"
                        th:text="${d.departmentName}">PB</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Mức ưu tiên</label>
            <select class="form-select" name="priority">
                <option th:each="p : ${priorities}"
                        th:value="${p.name()}"
                        th:selected="${announcement.priority != null and announcement.priority.name() == p.name()}"
                        th:text="${p.name()}">NORMAL</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Thời điểm đăng (để trống = ngay bây giờ)</label>
            <input class="form-control" type="datetime-local" name="publishedAt"
                   th:value="${announcement.publishedAt != null} ? ${#temporals.format(announcement.publishedAt, 'yyyy-MM-dd''T''HH:mm')} : ''"/>
        </div>
        <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" name="active" value="true" id="active"
                   th:checked="${announcement.id == null or announcement.active}"/>
            <label class="form-check-label" for="active">Đang hiển thị</label>
        </div>
        <div class="form-check mb-4" th:if="${announcement.id == null}">
            <input class="form-check-input" type="checkbox" name="sendEmail" value="true" id="sendEmail"/>
            <label class="form-check-label fw-600" for="sendEmail">
                📧 Gửi email đến tất cả nhân viên (qua SendGrid)
            </label>
            <div style="font-size:0.78rem;color:#94a3b8;margin-top:2px;">Chỉ áp dụng khi tạo mới và "Đang hiển thị" được bật</div>
        </div>
        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/admin/announcements}" class="btn btn-outline-secondary">Huỷ</a>
    </form>
</div>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-search.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
