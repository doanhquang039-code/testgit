<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa Video - HRMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f4f8; }
        .sidebar { width: 240px; height: 100vh; position: fixed; left: 0; top: 0; background: linear-gradient(180deg, #0f172a, #1e293b); z-index: 100; overflow-y: auto; }
        .sidebar-logo { font-size: 1rem; font-weight: 700; color: white; text-align: center; padding: 18px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar a { color: #a0aec0; text-decoration: none; display: flex; align-items: center; gap: 10px; padding: 10px 20px; transition: all .2s; border-left: 3px solid transparent; font-size: 0.85rem; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,.08); color: white; border-left-color: #f59e0b; }
        .sidebar a i { width: 18px; }
        .sidebar hr { border-color: rgba(255,255,255,0.08); margin: 6px 16px; }
        .sidebar form { padding: 12px 16px 16px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 8px; }
        .main { margin-left: 240px; padding: 28px 32px; }
        .edit-layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; max-width: 1000px; }
        .form-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .form-card-header { background: linear-gradient(135deg, #7c3aed, #6366f1); padding: 20px 24px; color: white; }
        .form-card-header h5 { font-weight: 700; margin: 0; }
        .form-card-body { padding: 24px; }
        .form-label { font-weight: 600; color: #374151; font-size: 0.85rem; }
        .form-control, .form-select { border-radius: 10px; border: 1.5px solid #e5e7eb; padding: 10px 14px; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
        .btn-save { background: linear-gradient(135deg, #7c3aed, #6366f1); border: none; color: white; padding: 12px 28px; border-radius: 12px; font-weight: 600; }
        .preview-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; position: sticky; top: 24px; }
        .preview-thumb { aspect-ratio: 16/9; overflow: hidden; background: #1e293b; }
        .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .preview-info { padding: 16px; }
        .meta-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #64748b; margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">⚡ HRMS ADMIN</div>
    <a th:href="@{/admin/videos}" class="active"><i class="bi bi-collection-play"></i> Thư viện video</a>
    <a th:href="@{/admin/videos/upload}"><i class="bi bi-cloud-upload"></i> Upload video</a>
    <hr/>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
    </form>
</div>

<div class="main">
    <div class="mb-3">
        <a th:href="@{/admin/videos}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Quay lại
        </a>
    </div>

    <div class="edit-layout">
        <!-- Form -->
        <div class="form-card">
            <div class="form-card-header">
                <h5><i class="bi bi-pencil-square me-2"></i>Chỉnh sửa thông tin video</h5>
            </div>
            <div class="form-card-body">
                <form th:action="@{/admin/videos/edit/{id}(id=${video.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Tiêu đề <span class="text-danger">*</span></label>
                            <input type="text" name="title" class="form-control" required th:value="${video.title}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Danh mục</label>
                            <input type="text" name="category" class="form-control" list="catList"
                                   th:value="${video.category}"/>
                            <datalist id="catList">
                                <option th:each="c : ${categories}" th:value="${c}"></option>
                            </datalist>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tags</label>
                            <input type="text" name="tags" class="form-control" th:value="${video.tags}"
                                   placeholder="tag1,tag2,tag3"/>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Mô tả</label>
                            <textarea name="description" class="form-control" rows="4"
                                      th:text="${video.description}"></textarea>
                        </div>
                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="isPublished"
                                       id="isPublished" value="true" th:checked="${video.isPublished}"/>
                                <label class="form-check-label fw-600" for="isPublished">Xuất bản (hiển thị cho nhân viên)</label>
                            </div>
                        </div>
                        <div class="col-12 d-flex gap-2 mt-2">
                            <button type="submit" class="btn-save btn">
                                <i class="bi bi-check-lg me-2"></i>Lưu thay đổi
                            </button>
                            <a th:href="@{/admin/videos}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Preview -->
        <div class="preview-card">
            <div class="preview-thumb">
                <img th:src="${video.thumbnailOrDefault}" th:alt="${video.title}"
                     onerror="this.src='https://placehold.co/320x180/1e293b/94a3b8?text=Video'"/>
            </div>
            <div class="preview-info">
                <div style="font-weight:700;font-size:0.95rem;margin-bottom:10px;" th:text="${video.title}"></div>
                <div class="meta-row" th:if="${video.durationSec != null and video.durationSec > 0}">
                    <i class="bi bi-clock"></i><span th:text="${video.formattedDuration}"></span>
                </div>
                <div class="meta-row">
                    <i class="bi bi-eye"></i><span th:text="${(video.viewCount != null ? video.viewCount : 0) + ' lượt xem'}"></span>
                </div>
                <div class="meta-row" th:if="${video.uploader != null}">
                    <i class="bi bi-person"></i><span th:text="${video.uploader.fullName}"></span>
                </div>
                <div class="meta-row" th:if="${video.createdAt != null}">
                    <i class="bi bi-calendar"></i>
                    <span th:text="${#temporals.format(video.createdAt, 'dd/MM/yyyy')}"></span>
                </div>
                <a th:href="@{/videos/{id}(id=${video.id})}" target="_blank"
                   class="btn btn-outline-primary btn-sm w-100 mt-3" style="border-radius:10px;">
                    <i class="bi bi-play-fill me-1"></i>Xem video
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
