<div class="card shadow-sm border-0">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
        <h5 class="text-primary mb-0 fw-bold">📜 DANH SÁCH HỢP ĐỒNG</h5>
        <a th:href="@{/admin/contracts/add}" class="btn btn-primary">➕ Tạo hợp đồng mới</a>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0 text-center">
            <thead class="table-light">
                <tr>
                    <th>Số HĐ</th>
                    <th>Nhân viên</th>
                    <th>Loại HĐ</th>
                    <th>Ngày bắt đầu</th>
                    <th>Ngày kết thúc</th>
                    <th>Lương cơ bản</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${contracts}">
    <td th:text="${c.id}"></td>
    <td class="fw-bold" th:text="${c.user != null ? c.user.fullName : '---'}"></td>
    <td th:text="${c.contractType}"></td>
    <td th:text="${c.signDate != null ? #temporals.format(c.signDate, 'dd-MM-yyyy') : '---'}"></td>
    <td th:text="${c.expiryDate != null ? #temporals.format(c.expiryDate, 'dd-MM-yyyy') : 'Vô thời hạn'}"></td>
    <td class="text-success fw-bold" th:text="${#numbers.formatDecimal(c.baseSalaryOnContract, 0, 'COMMA', 0, 'POINT')}"></td>
    <td>
        <a th:href="@{/admin/contracts/edit/{id}(id=${c.id})}" class="btn btn-sm btn-outline-warning">Sửa</a>
    </td>
</tr>
            </tbody>
        </table>
    </div>
</div>
