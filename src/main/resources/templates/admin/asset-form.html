<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Tài sản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${asset.id != null ? 'Chỉnh sửa Tài sản' : 'Thêm Tài sản Mới'}"></h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/assets/save}" th:object="${asset}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{createdAt}">
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Mã Tài sản (*)</label>
                                <input type="text" class="form-control" th:field="*{assetCode}" required placeholder="Vd: LT-001">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tên Tài sản (*)</label>
                                <input type="text" class="form-control" th:field="*{assetName}" required placeholder="Vd: Laptop Dell XPS 15">
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Danh mục (*)</label>
                                <select class="form-select" th:field="*{category}">
                                    <option value="LAPTOP">Laptop / PC</option>
                                    <option value="MONITOR">Màn hình</option>
                                    <option value="PHONE">Điện thoại</option>
                                    <option value="FURNITURE">Bàn ghế</option>
                                    <option value="OTHER">Thiết bị khác</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" th:field="*{status}">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Mô tả chi tiết</label>
                            <textarea class="form-control" rows="3" th:field="*{description}" placeholder="Cấu hình, tình trạng hao mòn..."></textarea>
                        </div>

                        <div class="text-end">
                            <a th:href="@{/admin/assets}" class="btn btn-secondary">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary px-4">Lưu Tài sản</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
