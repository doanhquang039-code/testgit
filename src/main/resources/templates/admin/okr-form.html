<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Create Objective</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #F3F4F6; }
        .key-result-item {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="row mb-4">
            <div class="col">
                <h1 class="h3 mb-0"><i class="bi bi-bullseye me-2"></i><span th:text="${pageTitle}">Create Objective</span></h1>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/okr/admin/objectives/save}" method="post" th:object="${objective}">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Objective Title *</label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Level *</label>
                            <select class="form-select" th:field="*{level}" required>
                                <option value="">Select Level</option>
                                <option th:each="level : ${levels}" th:value="${level}" th:text="${level}"></option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Start Date *</label>
                            <input type="date" class="form-control" th:field="*{startDate}" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">End Date *</label>
                            <input type="date" class="form-control" th:field="*{endDate}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Owner</label>
                            <select class="form-select" name="ownerId">
                                <option value="">Select Owner</option>
                                <!-- Will be populated dynamically -->
                            </select>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <select class="form-select" name="departmentId">
                                <option value="">Select Department</option>
                                <option th:each="dept : ${departments}" 
                                        th:value="${dept.id}" 
                                        th:text="${dept.name}"></option>
                            </select>
                        </div>
                        
                        <div class="col-12">
                            <hr>
                            <h5 class="mb-3">Key Results</h5>
                            <div id="keyResultsContainer"></div>
                            <button type="button" class="btn btn-outline-primary btn-sm" onclick="addKeyResult()">
                                <i class="bi bi-plus-lg me-2"></i>Add Key Result
                            </button>
                        </div>
                        
                        <div class="col-12">
                            <hr>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-2"></i>Save Objective
                            </button>
                            <a href="/okr/admin/objectives" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let krIndex = 0;
        
        function addKeyResult() {
            const container = document.getElementById('keyResultsContainer');
            const html = `
                <div class="key-result-item" id="kr-${krIndex}">
                    <div class="d-flex justify-content-between mb-2">
                        <h6 class="mb-0">Key Result #${krIndex + 1}</h6>
                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeKeyResult(${krIndex})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                    <div class="row g-2">
                        <div class="col-12">
                            <input type="text" class="form-control" name="keyResults[${krIndex}].title" 
                                   placeholder="Key Result Title" required>
                        </div>
                        <div class="col-12">
                            <textarea class="form-control" name="keyResults[${krIndex}].description" 
                                      rows="2" placeholder="Description"></textarea>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select" name="keyResults[${krIndex}].measurementType" required>
                                <option value="">Measurement Type</option>
                                <option value="PERCENTAGE">Percentage (%)</option>
                                <option value="NUMBER">Number</option>
                                <option value="BOOLEAN">Yes/No</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <input type="number" class="form-control" name="keyResults[${krIndex}].targetValue" 
                                   placeholder="Target Value" step="0.01" required>
                        </div>
                        <div class="col-md-4">
                            <input type="text" class="form-control" name="keyResults[${krIndex}].unit" 
                                   placeholder="Unit (optional)">
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            krIndex++;
        }
        
        function removeKeyResult(index) {
            document.getElementById(`kr-${index}`).remove();
        }
        
        // Add first key result on load
        document.addEventListener('DOMContentLoaded', () => {
            addKeyResult();
        });
    </script>
</body>
</html>
