<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${announcement.title} + ' - HRMS'">Chi tiết</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f4f8; min-height: 100vh; margin: 0; }
        .main { max-width: 800px; margin: 0 auto; padding: 32px 20px 60px; }
        .paper { background: white; border-radius: 16px; padding: 28px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        .meta { font-size: 0.85rem; color: #64748b; }
        .content { white-space: pre-wrap; line-height: 1.7; color: #1e293b; margin-top: 20px; }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
    </style>
</head>
<body>
<div class="main">
    <a href="/user1/announcements" class="btn btn-link text-decoration-none ps-0 mb-3"><i class="bi bi-arrow-left"></i> Danh sách</a>
    <div class="paper">
        <span class="badge rounded-pill mb-2"
              th:classappend="${announcement.priority.name() == 'URGENT'} ? ' text-bg-danger' : (${announcement.priority.name() == 'HIGH'} ? ' text-bg-warning' : ' text-bg-secondary')"
              th:text="${announcement.priority}">NORMAL</span>
        <h1 class="h4 fw-bold mt-2" th:text="${announcement.title}">Tiêu đề</h1>
        <div class="meta mt-2">
            <span th:text="${#temporals.format(announcement.publishedAt, 'dd/MM/yyyy HH:mm')}">—</span>
            <span th:if="${announcement.targetDepartment != null}">
                · Phòng ban: <strong th:text="${announcement.targetDepartment.departmentName}">—</strong>
            </span>
            <span th:if="${announcement.targetDepartment == null}">· <strong>Toàn công ty</strong></span>
            <span th:if="${announcement.author != null}">
                · Đăng bởi <strong th:text="${announcement.author.fullName}">—</strong>
            </span>
        </div>
        <div class="content" th:text="${announcement.content}">Nội dung</div>
    </div>
</div>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
