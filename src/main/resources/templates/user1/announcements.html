<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo công ty - HRMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f4f8; min-height: 100vh; margin: 0; }
        .sidebar { width: 260px; min-height: 100vh; background: linear-gradient(180deg, #0f172a, #1e293b); position: fixed; left: 0; top: 0; z-index: 100; box-shadow: 4px 0 20px rgba(0,0,0,0.25); }
        .sidebar-brand { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); color: white; font-weight: 700; }
        .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
        .sidebar nav a:hover, .sidebar nav a.active { color: white; background: rgba(99,102,241,0.15); border-left: 3px solid #6366f1; }
        .main { margin-left: 260px; padding: 28px 32px; max-width: 900px; }
        .card-item { background: white; border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; text-decoration: none; color: inherit; display: block; transition: transform .15s; }
        .card-item:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .badge-p { font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
        .p-URGENT { background: #fee2e2; color: #b91c1c; }
        .p-HIGH { background: #ffedd5; color: #c2410c; }
        .p-NORMAL { background: #f1f5f9; color: #475569; }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand"><i class="bi bi-megaphone"></i> HRMS</div>
    <nav>
        <a href="/user1/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/user1/announcements" class="active"><i class="bi bi-building"></i> Thông báo công ty</a>
        <a href="/notifications"><i class="bi bi-bell"></i> Thông báo cá nhân</a>
    </nav>
    <div class="p-3 mt-4">
          <!-- Language Toggle -->
          <div class="lang-toggle-wrap" style="padding:8px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;">
            <div class="lang-toggle" style="display:flex;align-items:center;gap:6px;justify-content:center;">
              <button class="lang-btn" data-lang="vi"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127475;&#127483; VI
              </button>
              <span style="color:rgba(255,255,255,0.2);font-size:0.7rem;">|</span>
              <button class="lang-btn" data-lang="en"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127468;&#127463; EN
              </button>
            </div>
          </div>
        <form action="/logout" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm w-100">Đăng xuất</button>
        </form>
    </div>
</div>
<div class="main">
    <h1 class="h3 fw-bold mb-4">Thông báo nội bộ</h1>
    <p class="text-muted small mb-4">Các tin gửi toàn công ty hoặc theo phòng ban của bạn.</p>

    <div th:if="${#lists.isEmpty(announcements)}" class="text-center py-5 bg-white rounded-4 shadow-sm">
        <i class="bi bi-inbox fs-1 text-muted"></i>
        <p class="text-muted mt-3">Chưa có thông báo nào.</p>
    </div>

    <a th:each="a : ${announcements}" th:href="@{/user1/announcements/{id}(id=${a.id})}" class="card-item">
        <div class="d-flex justify-content-between align-items-start gap-2">
            <div>
                <span class="badge-p mb-2 d-inline-block"
                      th:classappend="${a.priority.name() == 'URGENT'} ? ' p-URGENT' : (${a.priority.name() == 'HIGH'} ? ' p-HIGH' : ' p-NORMAL')"
                      th:text="${a.priority}">NORMAL</span>
                <h2 class="h6 fw-bold mb-1" th:text="${a.title}">Tiêu đề</h2>
                <div class="small text-muted" th:text="${#temporals.format(a.publishedAt, 'dd/MM/yyyy HH:mm')}">—</div>
            </div>
            <i class="bi bi-chevron-right text-muted"></i>
        </div>
    </a>
</div>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
