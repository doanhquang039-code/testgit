<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xin nghỉ phép - Nhân viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .top-nav { background: #343a40; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .top-nav a { color: #adb5bd; text-decoration: none; margin-left: 16px; }
        .top-nav a:hover { color: white; }
        .status-PENDING  { background: #ffc107; color: #000; }
        .status-APPROVED { background: #198754; color: white; }
        .status-REJECTED { background: #dc3545; color: white; }
    </style>
</head>
<body>
<!-- Navbar -->
<div class="top-nav">
    <span>👤 <strong th:text="${currentUser.fullName}">Nhân viên</strong></span>
    <div>
        <a th:href="@{/user1/dashboard}">🏠 Dashboard</a>
        <a th:href="@{/user/attendance}">📋 Chấm công</a>
        <a th:href="@{/user/leaves}" class="text-white fw-bold">📅 Nghỉ phép</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-sm btn-outline-light ms-3">Đăng xuất</button>
        </form>
    </div>
</div>

<div class="container py-4">
    <div class="row">
        <!-- Form xin nghỉ -->
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header fw-bold">📝 Nộp đơn xin nghỉ phép</div>
                <div class="card-body">
                    <form th:action="@{/user/leaves/submit}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label">Loại nghỉ phép</label>
                            <select name="leaveType" class="form-select" required>
                                <option value="ANNUAL">Nghỉ phép năm</option>
                                <option value="SICK">Nghỉ bệnh</option>
                                <option value="UNPAID">Nghỉ không lương</option>
                                <option value="MATERNITY">Nghỉ thai sản</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ngày bắt đầu</label>
                            <input type="date" name="startDate" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ngày kết thúc</label>
                            <input type="date" name="endDate" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Lý do</label>
                            <textarea name="reason" class="form-control" rows="4"
                                      placeholder="Nhập lý do xin nghỉ..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">📤 Gửi đơn</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Danh sách đơn của tôi -->
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header fw-bold">📋 Đơn nghỉ phép của tôi</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Loại</th>
                                <th>Từ ngày</th>
                                <th>Đến ngày</th>
                                <th>Lý do</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(myLeaves)}">
                                <td colspan="5" class="text-center text-muted py-4">Chưa có đơn xin nghỉ nào</td>
                            </tr>
                            <tr th:each="lr : ${myLeaves}">
                                <td th:text="${lr.leaveType}"></td>
                                <td th:text="${lr.startDate}"></td>
                                <td th:text="${lr.endDate}"></td>
                                <td>
                                    <span th:text="${#strings.truncate(lr.reason, 40)}"></span>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${'status-' + lr.status}"
                                          th:text="${lr.status}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
