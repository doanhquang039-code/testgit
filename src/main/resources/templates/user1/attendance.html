<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chấm công - Nhân viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .top-nav { background: #343a40; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .top-nav a { color: #adb5bd; text-decoration: none; margin-left: 16px; }
        .top-nav a:hover { color: white; }
        .checkin-card { border-radius: 16px; padding: 32px; text-align: center; }
        .status-badge-PRESENT     { background: #198754; color: white; border-radius: 8px; padding: 4px 12px; }
        .status-badge-LATE        { background: #fd7e14; color: white; border-radius: 8px; padding: 4px 12px; }
        .status-badge-EARLY_LEAVE { background: #0dcaf0; color: #000; border-radius: 8px; padding: 4px 12px; }
        .status-badge-ABSENT      { background: #dc3545; color: white; border-radius: 8px; padding: 4px 12px; }
    </style>
</head>
<body>

<!-- Top Navbar -->
<div class="top-nav">
    <span>👤 <strong th:text="${currentUser.fullName}">Nhân viên</strong></span>
    <div>
        <a th:href="@{/user1/dashboard}">🏠 Dashboard</a>
        <a th:href="@{/user/attendance}">📋 Chấm công</a>
        <a th:href="@{/user/leaves}">📅 Nghỉ phép</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-sm btn-outline-light ms-3">Đăng xuất</button>
        </form>
    </div>
</div>

<div class="container py-4">
    <h2 class="mb-4">📋 Lịch chấm công của tôi</h2>

    <!-- Check-in / Check-out Card -->
    <div class="card checkin-card shadow-sm mb-5">
        <h4 class="mb-3">Hôm nay: <span th:text="${today}"></span></h4>

        <div th:if="${todayRecord == null}">
            <p class="text-muted">Bạn chưa check-in hôm nay.</p>
            <form th:action="@{/user/attendance/checkin}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-success btn-lg px-5">
                    ✅ Check-in ngay
                </button>
            </form>
        </div>

        <div th:if="${todayRecord != null}">
            <div class="row justify-content-center g-4">
                <div class="col-md-3 text-center">
                    <div class="fs-5 text-muted">Giờ vào</div>
                    <div class="fs-2 fw-bold text-success" th:text="${todayRecord.checkInTime}">08:00</div>
                </div>
                <div class="col-md-3 text-center">
                    <div class="fs-5 text-muted">Giờ ra</div>
                    <div class="fs-2 fw-bold text-primary"
                         th:text="${todayRecord.checkOutTime != null ? todayRecord.checkOutTime : '--:--'}">--:--</div>
                </div>
                <div class="col-md-3 text-center">
                    <div class="fs-5 text-muted">Trạng thái</div>
                    <span th:class="${'status-badge-' + todayRecord.status}"
                          th:text="${todayRecord.status}"></span>
                </div>
            </div>
            <div class="mt-4" th:if="${todayRecord.checkOutTime == null}">
                <form th:action="@{/user/attendance/checkout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-warning btn-lg px-5">
                        🏁 Check-out
                    </button>
                </form>
            </div>
            <p class="text-muted mt-3" th:if="${todayRecord.checkOutTime != null}">✔ Bạn đã hoàn thành ca làm việc hôm nay.</p>
        </div>
    </div>

    <!-- Monthly history -->
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>Lịch sử tháng này</strong>
            <form th:action="@{/user/attendance}" method="get" class="d-flex gap-2">
                <select name="month" class="form-select form-select-sm">
                    <option th:each="m : ${#numbers.sequence(1,12)}"
                            th:value="${m}"
                            th:text="${'Tháng ' + m}"
                            th:selected="${m == month}"></option>
                </select>
                <input type="number" name="year" class="form-control form-control-sm" th:value="${year}" style="width:90px">
                <button type="submit" class="btn btn-sm btn-outline-primary">Xem</button>
            </form>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Ngày</th>
                        <th>Check-in</th>
                        <th>Check-out</th>
                        <th>Trạng thái</th>
                        <th>Ghi chú</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(attendances)}">
                        <td colspan="5" class="text-center text-muted py-3">Chưa có dữ liệu tháng này</td>
                    </tr>
                    <tr th:each="a : ${attendances}">
                        <td th:text="${a.attendanceDate}"></td>
                        <td th:text="${a.checkInTime != null ? a.checkInTime : '--:--'}"></td>
                        <td th:text="${a.checkOutTime != null ? a.checkOutTime : '--:--'}"></td>
                        <td><span th:class="${'status-badge-' + a.status}" th:text="${a.status}"></span></td>
                        <td th:text="${a.note != null ? a.note : ''}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
