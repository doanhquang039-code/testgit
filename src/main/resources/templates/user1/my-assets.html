<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tài sản của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<!-- Ở đây bạn có thể dùng layout chung cho user: <div th:replace="~{fragments/user_sidebar :: sidebar}"></div> -->

<div class="container mt-5 mb-5">
    <h2 class="mb-4 text-primary"><i class="bi bi-pc-display"></i> Thiết bị & Tài sản được cấp</h2>
    
    <div class="row">
        <div class="col-md-4 mb-4" th:each="assignment : ${myAssets}">
            <div class="card h-100 shadow-sm border-0 border-top border-4" 
                 th:classappend="${assignment.actualReturn == null ? 'border-success' : 'border-secondary'}">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                    <span class="fw-bold fs-5 text-dark" th:text="${assignment.asset.assetCode}"></span>
                    <span class="badge rounded-pill" 
                          th:classappend="${assignment.actualReturn == null ? 'bg-success' : 'bg-secondary'}"
                          th:text="${assignment.actualReturn == null ? 'Đang sử dụng' : 'Đã trả công ty'}"></span>
                </div>
                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${assignment.asset.assetName}"></h5>
                    <p class="card-text text-muted mb-3" th:text="${assignment.asset.category}"></p>
                    
                    <ul class="list-unstyled mb-0">
                        <li class="mb-2"><i class="bi bi-calendar-check text-primary me-2"></i><strong>Ngày nhận:</strong> <span th:text="${#temporals.format(assignment.assignedDate, 'dd/MM/yyyy')}"></span></li>
                        <li class="mb-2"><i class="bi bi-shield-check text-info me-2"></i><strong>Tình trạng:</strong> <span th:text="${assignment.conditionOnAssign}"></span></li>
                        
                        <li th:if="${assignment.actualReturn != null}" class="text-danger mt-3 border-top pt-2">
                            <i class="bi bi-calendar-x me-2"></i><strong>Đã trả ngày:</strong> <span th:text="${#temporals.format(assignment.actualReturn, 'dd/MM/yyyy')}"></span>
                        </li>
                    </ul>
                </div>
                <div class="card-footer bg-light text-muted small py-2">
                    <i class="bi bi-person-fill text-muted me-1"></i> Bàn giao bởi: <span class="fw-bold" th:text="${assignment.assignedBy != null ? assignment.assignedBy.fullName : 'Hệ thống'}"></span>
                </div>
            </div>
        </div>
        
        <div class="col-12" th:if="${#lists.isEmpty(myAssets)}">
            <div class="alert alert-info text-center py-4 fs-5 shadow-sm border-0">
                <i class="bi bi-info-circle me-2"></i> Bạn hiện không giữ thiết bị hay tài sản nào của công ty.
            </div>
        </div>
    </div>
</div>
</body>
</html>
