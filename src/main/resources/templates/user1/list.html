<div class="card p-4">
    <table class="table table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên đăng nhập</th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Quyền</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.fullName}"></td>
                <td th:text="${user.email}"></td>
                <td>
                    <span class="badge" 
                          th:classappend="${user.role == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
                          th:text="${user.role}"></span>
                </td>
                <td>
                    <a th:href="@{'/admin/user/edit/' + ${user.id}}" class="btn btn-sm btn-info text-white">Sửa</a>
                    <a th:href="@{'/admin/user/delete/' + ${user.id}}" 
                       class="btn btn-sm btn-danger" 
                       onclick="return confirm('Xóa user này?')">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
