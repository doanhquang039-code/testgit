<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo - HRMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f4f8; min-height: 100vh; }
        .sidebar { width: 260px; min-height: 100vh; background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); position: fixed; left: 0; top: 0; z-index: 100; box-shadow: 4px 0 20px rgba(0,0,0,0.3); }
        .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .brand-name { color: white; font-weight: 700; font-size: 1rem; }
        .brand-sub { color: #64748b; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }
        .sidebar-user { padding: 16px 20px; display: flex; align-items: center; gap: 12px; background: rgba(99,102,241,0.1); margin: 16px 12px; border-radius: 12px; }
        .sidebar-user-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(99,102,241,0.5); }
        .sidebar-user-name { color: white; font-weight: 600; font-size: 0.85rem; }
        .sidebar-user-role { color: #94a3b8; font-size: 0.72rem; }
        .sidebar-section-label { color: #475569; font-size: 0.65rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 12px 20px 4px; }
        .sidebar nav a { display: flex; align-items: center; gap: 12px; padding: 10px 20px; color: #94a3b8; text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar nav a:hover, .sidebar nav a.active { color: white; background: rgba(99,102,241,0.15); border-left-color: #6366f1; }
        .sidebar nav a i { font-size: 1rem; width: 20px; }
        .sidebar-logout { padding: 20px; border-top: 1px solid rgba(255,255,255,0.08); position: absolute; bottom: 0; width: 100%; }
        .main-content { margin-left: 260px; padding: 28px 32px; }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .page-header h1 { font-size: 1.6rem; font-weight: 700; color: #0f172a; margin: 0; }

        .notif-card {
            background: white; border-radius: 14px; padding: 18px 20px;
            margin-bottom: 12px; display: flex; align-items: flex-start; gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #f1f5f9;
            transition: all 0.2s; cursor: pointer;
        }
        .notif-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
        .notif-card.unread { border-left: 4px solid #6366f1; background: #fdfcff; }
        .notif-icon {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .icon-INFO         { background: #dbeafe; }
        .icon-SUCCESS      { background: #d1fae5; }
        .icon-WARNING      { background: #fff7ed; }
        .icon-DANGER       { background: #fee2e2; }
        .icon-LEAVE_REQUEST { background: #fef3c7; }
        .icon-TASK_ASSIGNED { background: #ede9fe; }
        .icon-PAYROLL      { background: #d1fae5; }
        .icon-ATTENDANCE   { background: #dbeafe; }
        .notif-msg { font-weight: 500; font-size: 0.88rem; color: #1e293b; margin-bottom: 4px; }
        .notif-time { font-size: 0.75rem; color: #94a3b8; }
        .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; margin-left: auto; flex-shrink: 0; margin-top: 6px; }

        .btn-mark-all { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .btn-mark-all:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(99,102,241,0.4); }

        .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .empty-state i { font-size: 3.5rem; color: #cbd5e1; display: block; margin-bottom: 16px; }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .filter-chip { padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 2px solid #e2e8f0; background: white; color: #64748b; text-decoration: none; }
        .filter-chip.active { background: #6366f1; color: white; border-color: #6366f1; }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">⚡</div>
        <div>
            <div class="brand-name">HRMS</div>
            <div class="brand-sub">HR Platform</div>
        </div>
    </div>
    <div class="sidebar-user">
        <img class="sidebar-user-avatar" th:src="@{'/uploads/' + ${user.profileImage}}"
             onerror="this.src='https://ui-avatars.com/api/?name=NV&background=6366f1&color=fff&size=42'"
             th:alt="${user.fullName}" alt="Avatar">
        <div>
            <div class="sidebar-user-name" th:text="${user.fullName}">Nhân viên</div>
            <div class="sidebar-user-role" th:text="${user.role}">USER</div>
        </div>
    </div>
    <div class="sidebar-section-label">Cá nhân</div>
    <nav>
        <a href="/user1/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/user1/profile"><i class="bi bi-person-circle"></i> Hồ sơ cá nhân</a>
        <a href="/user/attendance"><i class="bi bi-clipboard-check"></i> Chấm công</a>
        <a href="/user/leaves"><i class="bi bi-calendar-x"></i> Nghỉ phép</a>
        <a href="/user1/payroll"><i class="bi bi-cash-coin"></i> Phiếu lương</a>
        <a href="/user1/tasks"><i class="bi bi-list-task"></i> Công việc của tôi</a>
        <a href="/notifications" class="active"><i class="bi bi-bell"></i> Thông báo
            <span class="badge bg-danger ms-auto" style="font-size:0.65rem;" th:if="${unreadCount > 0}" th:text="${unreadCount}"></span>
        </a>
    </nav>
    <div class="sidebar-logout">
          <!-- Language Toggle -->
          <div class="lang-toggle-wrap" style="padding:8px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;">
            <div class="lang-toggle" style="display:flex;align-items:center;gap:6px;justify-content:center;">
              <button class="lang-btn" data-lang="vi"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127475;&#127483; VI
              </button>
              <span style="color:rgba(255,255,255,0.2);font-size:0.7rem;">|</span>
              <button class="lang-btn" data-lang="en"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127468;&#127463; EN
              </button>
            </div>
          </div>
        <form action="/logout" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm w-100" style="border-radius:10px;">
                <i class="bi bi-box-arrow-right"></i> Đăng xuất
            </button>
        </form>
    </div>
</div>

<!-- MAIN -->
<div class="main-content">
    <div class="page-header">
        <div>
            <h1>🔔 Thông báo</h1>
            <div style="color:#64748b;font-size:0.88rem;margin-top:4px;">
                <span th:if="${unreadCount > 0}">
                    <span th:text="${unreadCount}">0</span> thông báo chưa đọc
                </span>
                <span th:if="${unreadCount == 0}">Tất cả đã đọc</span>
            </div>
        </div>
        <form action="/notifications/mark-all-read" method="post" th:if="${unreadCount > 0}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-mark-all">
                <i class="bi bi-check-all"></i> Đánh dấu tất cả đã đọc
            </button>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(notifications)}" class="empty-state">
        <i class="bi bi-bell-slash"></i>
        <div style="font-size:1rem;font-weight:600;color:#64748b;">Chưa có thông báo nào</div>
        <div style="font-size:0.85rem;color:#94a3b8;margin-top:4px;">Các thông báo mới sẽ xuất hiện tại đây</div>
    </div>

    <div th:each="n : ${notifications}" th:class="${!n.read ? 'notif-card unread' : 'notif-card'}">
        <div th:class="'notif-icon icon-' + ${n.type}">
            <span th:switch="${n.type.name()}">
                <span th:case="'LEAVE_REQUEST'">📅</span>
                <span th:case="'TASK_ASSIGNED'">📝</span>
                <span th:case="'PAYROLL'">💰</span>
                <span th:case="'ATTENDANCE'">📋</span>
                <span th:case="'SUCCESS'">✅</span>
                <span th:case="'WARNING'">⚠️</span>
                <span th:case="'DANGER'">🚨</span>
                <span th:case="*">ℹ️</span>
            </span>
        </div>
        <div style="flex:1;">
            <div class="notif-msg" th:text="${n.message}">Thông báo</div>
            <div class="notif-time">
                <i class="bi bi-clock"></i>
                <span th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}">01/01 08:00</span>
            </div>
            <div th:if="${n.link != null}" style="margin-top:6px;">
                <a th:href="${n.link}" style="font-size:0.78rem;color:#6366f1;font-weight:600;text-decoration:none;">Xem chi tiết →</a>
            </div>
        </div>
        <div th:if="${!n.read}" class="unread-dot"></div>
    </div>
</div>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
