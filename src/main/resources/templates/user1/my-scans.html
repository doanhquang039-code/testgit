<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử quét QR - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .scan-card {
            transition: transform 0.2s;
            border-left: 4px solid #0d6efd;
        }
        .scan-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .scan-success {
            border-left-color: #198754;
        }
        .scan-failed {
            border-left-color: #dc3545;
        }
        .qr-type-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }
        .filter-section {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2><i class="fas fa-history me-2"></i>Lịch sử quét QR</h2>
                <p class="text-muted mb-0">Xem lại các lần quét mã QR của bạn</p>
            </div>
            <a th:href="@{/user/qrcode/scan}" class="btn btn-primary">
                <i class="fas fa-qrcode me-2"></i>Quét mã mới
            </a>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <form method="get" th:action="@{/user/qrcode/my-scans}">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Loại QR</label>
                        <select name="type" class="form-select">
                            <option value="">Tất cả</option>
                            <option value="CHECK_IN">Check-in</option>
                            <option value="ASSET">Tài sản</option>
                            <option value="DOCUMENT">Tài liệu</option>
                            <option value="EVENT">Sự kiện</option>
                            <option value="MEETING_ROOM">Phòng họp</option>
                            <option value="PARKING">Bãi đỗ xe</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Trạng thái</label>
                        <select name="status" class="form-select">
                            <option value="">Tất cả</option>
                            <option value="success">Thành công</option>
                            <option value="failed">Thất bại</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Từ ngày</label>
                        <input type="date" name="fromDate" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Đến ngày</label>
                        <input type="date" name="toDate" class="form-control">
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-filter me-2"></i>Lọc
                    </button>
                    <a th:href="@{/user/qrcode/my-scans}" class="btn btn-secondary">
                        <i class="fas fa-redo me-2"></i>Đặt lại
                    </a>
                </div>
            </form>
        </div>

        <!-- Statistics Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-primary" th:text="${totalScans}">0</h3>
                        <p class="text-muted mb-0">Tổng số lần quét</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-success" th:text="${successfulScans}">0</h3>
                        <p class="text-muted mb-0">Thành công</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-danger" th:text="${failedScans}">0</h3>
                        <p class="text-muted mb-0">Thất bại</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-info" th:text="${todayScans}">0</h3>
                        <p class="text-muted mb-0">Hôm nay</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scan History List -->
        <div class="card">
            <div class="card-body">
                <div th:if="${scans.empty}" class="text-center py-5">
                    <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                    <p class="text-muted">Chưa có lịch sử quét mã QR</p>
                    <a th:href="@{/user/qrcode/scan}" class="btn btn-primary">
                        <i class="fas fa-qrcode me-2"></i>Quét mã ngay
                    </a>
                </div>

                <div th:if="${!scans.empty}">
                    <div th:each="scan : ${scans}" 
                         class="scan-card card mb-3"
                         th:classappend="${scan.isSuccessful} ? 'scan-success' : 'scan-failed'">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-md-1 text-center">
                                    <i th:if="${scan.isSuccessful}" 
                                       class="fas fa-check-circle fa-2x text-success"></i>
                                    <i th:unless="${scan.isSuccessful}" 
                                       class="fas fa-times-circle fa-2x text-danger"></i>
                                </div>
                                <div class="col-md-7">
                                    <h5 class="mb-1" th:text="${scan.qrCode.name}">QR Code Name</h5>
                                    <div class="mb-2">
                                        <span class="badge qr-type-badge bg-primary me-2" 
                                              th:text="${scan.qrCode.type}">TYPE</span>
                                        <span th:if="${scan.qrCode.location}" 
                                              class="text-muted">
                                            <i class="fas fa-map-marker-alt me-1"></i>
                                            <span th:text="${scan.qrCode.location}">Location</span>
                                        </span>
                                    </div>
                                    <p class="text-muted mb-0" th:if="${scan.notes}" th:text="${scan.notes}">Notes</p>
                                    <p class="text-danger mb-0" th:if="${!scan.isSuccessful && scan.errorMessage}" 
                                       th:text="${scan.errorMessage}">Error message</p>
                                </div>
                                <div class="col-md-4 text-end">
                                    <div class="mb-2">
                                        <i class="fas fa-clock me-1"></i>
                                        <span th:text="${#temporals.format(scan.scannedAt, 'dd/MM/yyyy HH:mm')}">
                                            Date Time
                                        </span>
                                    </div>
                                    <div class="text-muted small">
                                        <div th:if="${scan.scanType}">
                                            <i class="fas fa-tag me-1"></i>
                                            <span th:text="${scan.scanType}">Scan Type</span>
                                        </div>
                                        <div th:if="${scan.deviceInfo}">
                                            <i class="fas fa-mobile-alt me-1"></i>
                                            <span th:text="${scan.deviceInfo}">Device</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/user/qrcode/my-scans(page=${currentPage - 1})}">
                        Trước
                    </a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                    class="page-item" 
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/user/qrcode/my-scans(page=${i})}" 
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/user/qrcode/my-scans(page=${currentPage + 1})}">
                        Sau
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
