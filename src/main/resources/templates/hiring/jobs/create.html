<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Job Posting - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="fragments/hiring-sidebar :: sidebar"></div>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-plus-circle me-2"></i>Create Job Posting</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a href="/hiring/jobs" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Back to Jobs
                        </a>
                    </div>
                </div>

                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Job Form -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Job Details</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/hiring/jobs/create}" th:object="${job}" method="post">
                            <div class="row">
                                <!-- Basic Information -->
                                <div class="col-md-6">
                                    <h6 class="text-muted mb-3">Basic Information</h6>
                                    
                                    <div class="mb-3">
                                        <label for="title" class="form-label">Job Title *</label>
                                        <input type="text" class="form-control" id="title" th:field="*{title}" required>
                                    </div>

                                    <div class="mb-3">
                                        <label for="department" class="form-label">Department *</label>
                                        <select class="form-select" id="department" th:field="*{department}" required>
                                            <option value="">Select Department</option>
                                            <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}">Engineering</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="position" class="form-label">Position</label>
                                        <select class="form-select" id="position" th:field="*{position}">
                                            <option value="">Select Position</option>
                                            <option th:each="pos : ${positions}" th:value="${pos.id}" th:text="${pos.title}">Software Engineer</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="employmentType" class="form-label">Employment Type *</label>
                                        <select class="form-select" id="employmentType" th:field="*{employmentType}" required>
                                            <option value="">Select Type</option>
                                            <option value="FULL_TIME">Full Time</option>
                                            <option value="PART_TIME">Part Time</option>
                                            <option value="CONTRACT">Contract</option>
                                            <option value="INTERNSHIP">Internship</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="experienceLevel" class="form-label">Experience Level *</label>
                                        <select class="form-select" id="experienceLevel" th:field="*{experienceLevel}" required>
                                            <option value="">Select Level</option>
                                            <option value="ENTRY">Entry Level</option>
                                            <option value="MID">Mid Level</option>
                                            <option value="SENIOR">Senior Level</option>
                                            <option value="EXECUTIVE">Executive</option>
                                        </select>
                                    </div>
                                </div>

                                <!-- Location & Salary -->
                                <div class="col-md-6">
                                    <h6 class="text-muted mb-3">Location & Compensation</h6>
                                    
                                    <div class="mb-3">
                                        <label for="location" class="form-label">Location *</label>
                                        <input type="text" class="form-control" id="location" th:field="*{location}" 
                                               placeholder="e.g., Ho Chi Minh City" required>
                                    </div>

                                    <div class="mb-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="remoteAllowed" th:field="*{remoteAllowed}">
                                            <label class="form-check-label" for="remoteAllowed">
                                                Remote work allowed
                                            </label>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="salaryMin" class="form-label">Minimum Salary</label>
                                                <div class="input-group">
                                                    <span class="input-group-text">$</span>
                                                    <input type="number" class="form-control" id="salaryMin" th:field="*{salaryMin}" 
                                                           placeholder="0" min="0" step="100">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="salaryMax" class="form-label">Maximum Salary</label>
                                                <div class="input-group">
                                                    <span class="input-group-text">$</span>
                                                    <input type="number" class="form-control" id="salaryMax" th:field="*{salaryMax}" 
                                                           placeholder="0" min="0" step="100">
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="closingDate" class="form-label">Application Closing Date</label>
                                        <input type="date" class="form-control" id="closingDate" th:field="*{closingDate}">
                                    </div>
                                </div>
                            </div>

                            <!-- Job Description -->
                            <div class="row">
                                <div class="col-12">
                                    <h6 class="text-muted mb-3">Job Description</h6>
                                    
                                    <div class="mb-3">
                                        <label for="description" class="form-label">Job Description *</label>
                                        <textarea class="form-control" id="description" th:field="*{description}" 
                                                  rows="6" required placeholder="Describe the role, responsibilities, and what the candidate will be doing..."></textarea>
                                    </div>

                                    <div class="mb-3">
                                        <label for="requirements" class="form-label">Requirements *</label>
                                        <textarea class="form-control" id="requirements" th:field="*{requirements}" 
                                                  rows="6" required placeholder="List the required skills, experience, education, and qualifications..."></textarea>
                                    </div>
                                </div>
                            </div>

                            <!-- Form Actions -->
                            <div class="row">
                                <div class="col-12">
                                    <hr>
                                    <div class="d-flex justify-content-between">
                                        <a href="/hiring/jobs" class="btn btn-outline-secondary">
                                            <i class="bi bi-x-circle me-1"></i>Cancel
                                        </a>
                                        <div>
                                            <button type="submit" class="btn btn-primary">
                                                <i class="bi bi-check-circle me-1"></i>Create Job Posting
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-update max salary when min salary changes
        document.getElementById('salaryMin').addEventListener('input', function() {
            const minSalary = parseInt(this.value);
            const maxSalaryInput = document.getElementById('salaryMax');
            const maxSalary = parseInt(maxSalaryInput.value);
            
            if (minSalary && (!maxSalary || maxSalary < minSalary)) {
                maxSalaryInput.value = minSalary;
            }
        });
    </script>
</body>
</html>
