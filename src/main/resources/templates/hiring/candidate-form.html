<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Form Ứng Viên - HRMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
    .sidebar { height: 100vh; background: linear-gradient(180deg, #1a1f2e, #2d3748); color: white; padding-top: 20px; position: sticky; top: 0; }
    .sidebar a { color: #a0aec0; text-decoration: none; display: flex; align-items: center; gap: 10px; padding: 10px 20px; transition: all 0.2s; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); color: white; border-left: 3px solid #667eea; }
    .sidebar-logo { font-size: 1rem; font-weight: 700; letter-spacing: 2px; color: white; text-align: center; padding: 12px; }

      /* ===== LANGUAGE TOGGLE ===== */
      .lang-btn { background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#94a3b8!important;border-radius:8px!important;padding:4px 10px!important;font-size:0.75rem!important;font-weight:600!important;cursor:pointer!important;transition:all 0.2s!important; }
      .lang-btn:hover { background:rgba(255,255,255,0.18)!important;color:white!important; }
      .lang-btn.active { background:#6366f1!important;border-color:#6366f1!important;color:white!important; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block sidebar shadow">
      <div class="sidebar-logo">🎯 HIRING</div>
      <hr style="border-color:rgba(255,255,255,.15)"/>
      <a th:href="@{/hiring}"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a th:href="@{/hiring/postings}"><i class="bi bi-megaphone"></i> Tin tuyển dụng</a>
      <a th:href="@{/hiring/candidates}" class="active"><i class="bi bi-people"></i> Ứng viên</a>
      <hr style="border-color:rgba(255,255,255,.1);margin:8px 16px"/>
      <a th:href="@{/admin/dashboard}"><i class="bi bi-arrow-left-circle"></i> Admin</a>
          <!-- Language Toggle -->
          <div class="lang-toggle-wrap" style="padding:8px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;">
            <div class="lang-toggle" style="display:flex;align-items:center;gap:6px;justify-content:center;">
              <button class="lang-btn" data-lang="vi"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127475;&#127483; VI
              </button>
              <span style="color:rgba(255,255,255,0.2);font-size:0.7rem;">|</span>
              <button class="lang-btn" data-lang="en"
                      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
                &#127468;&#127463; EN
              </button>
            </div>
          </div>
      <form th:action="@{/logout}" method="post" class="px-3 mt-4">
        <button type="submit" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
      </form>
    </nav>

    <main class="col-md-10 ms-sm-auto px-md-4 pt-4">
      <div class="d-flex justify-content-between align-items-center pb-2 mb-4 border-bottom">
        <h1 class="h3 mb-0">
          <i class="bi bi-person-plus text-success me-2"></i>
          <span th:text="${candidate.id == null ? 'Thêm Ứng Viên Mới' : 'Chỉnh Sửa Ứng Viên'}"></span>
        </h1>
        <a th:href="@{/hiring/candidates}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i> Quay lại
        </a>
      </div>

      <form th:action="@{/hiring/candidates/save}" th:object="${candidate}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <div class="row">
          <div class="col-md-8">
            <div class="card border-0 shadow-sm mb-4">
              <div class="card-header bg-white border-0 pt-4 pb-2">
                <h5 class="mb-0"><i class="bi bi-person-badge me-2 text-success"></i>Thông tin ứng viên</h5>
              </div>
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{fullName}" class="form-control" required
                           placeholder="Nguyễn Văn A"/>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="email@example.com"/>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Số điện thoại</label>
                    <input type="text" th:field="*{phone}" class="form-control" placeholder="0912345678"/>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Ngày nộp hồ sơ</label>
                    <input type="date" th:field="*{appliedDate}" class="form-control"/>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Vị trí ứng tuyển</label>
                    <select th:field="*{jobPosting.id}" class="form-select">
                      <option value="">-- Chọn vị trí --</option>
                      <option th:each="p : ${postings}" th:value="${p.id}" th:text="${p.title}"></option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Trạng thái</label>
                    <select th:field="*{status}" class="form-select">
                      <option value="NEW">🆕 Mới</option>
                      <option value="SCREENING">🔍 Sàng lọc</option>
                      <option value="INTERVIEW">💬 Phỏng vấn</option>
                      <option value="OFFER">📋 Offer</option>
                      <option value="HIRED">✅ Đã tuyển</option>
                      <option value="REJECTED">❌ Từ chối</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <label class="form-label fw-semibold">Link CV / Portfolio</label>
                    <input type="text" th:field="*{cvUrl}" class="form-control"
                           placeholder="https://drive.google.com/... hoặc LinkedIn URL"/>
                  </div>
                  <div class="col-12">
                    <label class="form-label fw-semibold">Ghi chú</label>
                    <textarea th:field="*{notes}" class="form-control" rows="3"
                              placeholder="Ấn tượng ban đầu, điểm mạnh, lưu ý..."></textarea>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card border-0 shadow-sm" style="background: linear-gradient(135deg,#11998e,#38ef7d);">
              <div class="card-body py-4 text-white">
                <h6 class="fw-bold mb-3"><i class="bi bi-info-circle me-2"></i>Pipeline tuyển dụng</h6>
                <div class="small">
                  <div class="mb-2 d-flex align-items-center gap-2"><span class="badge bg-light text-dark">1</span> Mới → Nhận CV</div>
                  <div class="mb-2 d-flex align-items-center gap-2"><span class="badge bg-light text-dark">2</span> Sàng lọc → Xem xét</div>
                  <div class="mb-2 d-flex align-items-center gap-2"><span class="badge bg-light text-dark">3</span> Phỏng vấn → Meeting</div>
                  <div class="mb-2 d-flex align-items-center gap-2"><span class="badge bg-light text-dark">4</span> Offer → Đề nghị</div>
                  <div class="d-flex align-items-center gap-2"><span class="badge bg-light text-dark">5</span> Đã tuyển → Onboard</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success px-4">
            <i class="bi bi-save me-1"></i> Lưu ứng viên
          </button>
          <a th:href="@{/hiring/candidates}" class="btn btn-outline-secondary px-4">Huỷ</a>
        </div>
      </form>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/lang-toggle.js}"></script>
<script th:src="@{/js/hrms-settings.js}"></script>
<script th:src="@{/js/hrms-notifications.js}"></script>
<script th:src="@{/js/hrms-ui.js}"></script>
</body>
</html>
