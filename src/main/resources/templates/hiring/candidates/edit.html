<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Candidate - Hiring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f4f6fb; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="fragments/hiring-sidebar :: sidebar"></div>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <div class="d-flex justify-content-between align-items-center pb-2 mb-4 border-bottom">
                <div>
                    <h1 class="h3 fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-warning"></i>Edit Candidate</h1>
                    <small class="text-muted" th:text="${candidate.fullName}">Candidate Name</small>
                </div>
                <a th:href="@{/hiring/candidates/{id}(id=${candidate.id})}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </a>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <form th:action="@{/hiring/candidates/{id}/edit(id=${candidate.id})}"
                          th:object="${candidate}" method="post">

                        <div class="row g-3">
                            <!-- Full Name -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Full Name *</label>
                                <input type="text" th:field="*{fullName}" class="form-control" required>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email *</label>
                                <input type="email" th:field="*{email}" class="form-control" required>
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone Number</label>
                                <input type="text" th:field="*{phoneNumber}" class="form-control">
                            </div>

                            <!-- Job Posting -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Applied For</label>
                                <select class="form-select" th:field="*{jobPosting.id}">
                                    <option value="">-- Select Job Posting --</option>
                                    <option th:each="jp : ${jobPostings}"
                                            th:value="${jp.id}"
                                            th:text="${jp.title}"
                                            th:selected="${candidate.jobPosting != null and candidate.jobPosting.id == jp.id}">
                                    </option>
                                </select>
                            </div>

                            <!-- Current Company -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Current Company</label>
                                <input type="text" th:field="*{currentCompany}" class="form-control">
                            </div>

                            <!-- Current Position -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Current Position</label>
                                <input type="text" th:field="*{currentPosition}" class="form-control">
                            </div>

                            <!-- Years Experience -->
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Years of Experience</label>
                                <input type="number" th:field="*{yearsOfExperience}" class="form-control" min="0">
                            </div>

                            <!-- Expected Salary -->
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Expected Salary ($)</label>
                                <input type="number" th:field="*{expectedSalary}" class="form-control" min="0">
                            </div>

                            <!-- Availability Date -->
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Availability Date</label>
                                <input type="date" th:field="*{availabilityDate}" class="form-control">
                            </div>

                            <!-- LinkedIn -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">LinkedIn URL</label>
                                <input type="url" th:field="*{linkedinUrl}" class="form-control" placeholder="https://linkedin.com/in/...">
                            </div>

                            <!-- Portfolio -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Portfolio URL</label>
                                <input type="url" th:field="*{portfolioUrl}" class="form-control" placeholder="https://...">
                            </div>

                            <!-- Resume URL -->
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Resume URL</label>
                                <input type="url" th:field="*{resumeUrl}" class="form-control">
                            </div>

                            <!-- Skills -->
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Skills</label>
                                <textarea th:field="*{skills}" class="form-control" rows="3"
                                          placeholder="e.g. Java, Spring Boot, SQL, React..."></textarea>
                            </div>

                            <!-- Education -->
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Education</label>
                                <textarea th:field="*{education}" class="form-control" rows="3"
                                          placeholder="Education background..."></textarea>
                            </div>

                            <!-- Cover Letter -->
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Cover Letter</label>
                                <textarea th:field="*{coverLetter}" class="form-control" rows="5"></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save me-1"></i>Save Changes
                            </button>
                            <a th:href="@{/hiring/candidates/{id}(id=${candidate.id})}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
