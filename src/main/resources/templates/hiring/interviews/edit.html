<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Interview - Hiring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f4f6fb; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="fragments/hiring-sidebar :: sidebar"></div>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <div class="d-flex justify-content-between align-items-center pb-2 mb-4 border-bottom">
                <div>
                    <h1 class="h3 fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-warning"></i>Edit Interview</h1>
                    <small class="text-muted" th:text="${interview.candidate?.fullName ?: 'Interview'}">Candidate</small>
                </div>
                <a th:href="@{/hiring/interviews/{id}(id=${interview.id})}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </a>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <form th:action="@{/hiring/interviews/{id}/edit(id=${interview.id})}"
                          th:object="${interview}" method="post">

                        <div class="row g-3">
                            <!-- Candidate -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Candidate</label>
                                <select class="form-select" name="candidate.id">
                                    <option value="">-- Select Candidate --</option>
                                    <option th:each="c : ${candidates}"
                                            th:value="${c.id}"
                                            th:text="${c.fullName}"
                                            th:selected="${interview.candidate != null and interview.candidate.id == c.id}">
                                    </option>
                                </select>
                            </div>

                            <!-- Interviewer -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Interviewer</label>
                                <select class="form-select" name="interviewer.id">
                                    <option value="">-- Select Interviewer --</option>
                                    <option th:each="u : ${interviewers}"
                                            th:value="${u.id}"
                                            th:text="${u.fullName}"
                                            th:selected="${interview.interviewer != null and interview.interviewer.id == u.id}">
                                    </option>
                                </select>
                            </div>

                            <!-- Interview Type -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Interview Type</label>
                                <select class="form-select" th:field="*{interviewType}">
                                    <option value="">-- Select Type --</option>
                                    <option value="TECHNICAL">Technical</option>
                                    <option value="HR">HR</option>
                                    <option value="BEHAVIORAL">Behavioral</option>
                                    <option value="CULTURAL_FIT">Cultural Fit</option>
                                    <option value="FINAL">Final Round</option>
                                </select>
                            </div>

                            <!-- Scheduled Time -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Scheduled Time</label>
                                <input type="datetime-local" th:field="*{scheduledTime}" class="form-control">
                            </div>

                            <!-- Duration -->
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Duration (minutes)</label>
                                <input type="number" th:field="*{durationMinutes}" class="form-control" min="15" step="15">
                            </div>

                            <!-- Location -->
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Location</label>
                                <input type="text" th:field="*{location}" class="form-control" placeholder="Office / Online">
                            </div>

                            <!-- Meeting Link -->
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Meeting Link</label>
                                <input type="url" th:field="*{meetingLink}" class="form-control" placeholder="https://meet.google.com/...">
                            </div>

                            <!-- Agenda -->
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Agenda</label>
                                <textarea th:field="*{agenda}" class="form-control" rows="4"
                                          placeholder="Interview agenda and topics to cover..."></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save me-1"></i>Save Changes
                            </button>
                            <a th:href="@{/hiring/interviews/{id}(id=${interview.id})}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
