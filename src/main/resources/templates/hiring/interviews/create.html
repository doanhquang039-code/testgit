<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Interview - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="fragments/hiring-sidebar :: sidebar"></div>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="bi bi-calendar-plus me-2"></i>Schedule Interview</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a href="/hiring/interviews" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Back to Interviews
                        </a>
                    </div>
                </div>

                <!-- Interview Form -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Interview Details</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/hiring/interviews/create}" th:object="${interview}" method="post">
                            <div class="row">
                                <!-- Basic Information -->
                                <div class="col-md-6">
                                    <h6 class="text-muted mb-3">Basic Information</h6>
                                    
                                    <div class="mb-3">
                                        <label for="candidate" class="form-label">Candidate *</label>
                                        <select class="form-select" id="candidate" th:field="*{candidate}" required>
                                            <option value="">Select Candidate</option>
                                            <option th:each="candidate : ${candidates}" th:value="${candidate.id}" 
                                                    th:text="${candidate.fullName} + ' - ' + ${candidate.jobPosting?.title ?: 'No Job'}"
                                                    th:selected="${interview.candidate != null && interview.candidate.id == candidate.id}">
                                                John Doe - Software Engineer
                                            </option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="interviewer" class="form-label">Interviewer *</label>
                                        <select class="form-select" id="interviewer" th:field="*{interviewer}" required>
                                            <option value="">Select Interviewer</option>
                                            <option th:each="interviewer : ${interviewers}" th:value="${interviewer.id}" th:text="${interviewer.fullName}">Jane Smith</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="interviewType" class="form-label">Interview Type *</label>
                                        <select class="form-select" id="interviewType" th:field="*{interviewType}" required>
                                            <option value="">Select Type</option>
                                            <option value="PHONE">Phone Interview</option>
                                            <option value="VIDEO">Video Interview</option>
                                            <option value="IN_PERSON">In-Person Interview</option>
                                            <option value="TECHNICAL">Technical Interview</option>
                                            <option value="HR">HR Interview</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="interviewRound" class="form-label">Interview Round</label>
                                        <select class="form-select" id="interviewRound" th:field="*{interviewRound}">
                                            <option value="1">Round 1 (Initial)</option>
                                            <option value="2">Round 2 (Technical)</option>
                                            <option value="3">Round 3 (Final)</option>
                                            <option value="4">Round 4 (Executive)</option>
                                        </select>
                                    </div>
                                </div>

                                <!-- Schedule & Location -->
                                <div class="col-md-6">
                                    <h6 class="text-muted mb-3">Schedule & Location</h6>
                                    
                                    <div class="mb-3">
                                        <label for="scheduledTime" class="form-label">Scheduled Date & Time *</label>
                                        <input type="datetime-local" class="form-control" id="scheduledTime" th:field="*{scheduledTime}" required>
                                    </div>

                                    <div class="mb-3">
                                        <label for="durationMinutes" class="form-label">Duration (minutes)</label>
                                        <select class="form-select" id="durationMinutes" th:field="*{durationMinutes}">
                                            <option value="30">30 minutes</option>
                                            <option value="45">45 minutes</option>
                                            <option value="60" selected>60 minutes</option>
                                            <option value="90">90 minutes</option>
                                            <option value="120">120 minutes</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="location" class="form-label">Location</label>
                                        <input type="text" class="form-control" id="location" th:field="*{location}" 
                                               placeholder="e.g., Conference Room A, Office Address">
                                    </div>

                                    <div class="mb-3">
                                        <label for="meetingLink" class="form-label">Meeting Link</label>
                                        <input type="url" class="form-control" id="meetingLink" th:field="*{meetingLink}" 
                                               placeholder="https://zoom.us/j/... or Google Meet link">
                                        <div class="form-text">For video interviews, provide the meeting link</div>
                                    </div>
                                </div>
                            </div>

                            <!-- Agenda & Notes -->
                            <div class="row">
                                <div class="col-12">
                                    <h6 class="text-muted mb-3">Agenda & Notes</h6>
                                    
                                    <div class="mb-3">
                                        <label for="agenda" class="form-label">Interview Agenda</label>
                                        <textarea class="form-control" id="agenda" th:field="*{agenda}" rows="4" 
                                                  placeholder="Outline what will be covered in this interview..."></textarea>
                                    </div>

                                    <div class="mb-3">
                                        <label for="notes" class="form-label">Additional Notes</label>
                                        <textarea class="form-control" id="notes" th:field="*{notes}" rows="3" 
                                                  placeholder="Any additional information or special instructions..."></textarea>
                                    </div>
                                </div>
                            </div>

                            <!-- Form Actions -->
                            <div class="row">
                                <div class="col-12">
                                    <hr>
                                    <div class="d-flex justify-content-between">
                                        <a href="/hiring/interviews" class="btn btn-outline-secondary">
                                            <i class="bi bi-x-circle me-1"></i>Cancel
                                        </a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-calendar-check me-1"></i>Schedule Interview
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-update location and meeting link based on interview type
        document.getElementById('interviewType').addEventListener('change', function() {
            const type = this.value;
            const locationField = document.getElementById('location');
            const meetingLinkField = document.getElementById('meetingLink');
            
            if (type === 'VIDEO') {
                locationField.placeholder = 'Online (Video Conference)';
                meetingLinkField.required = true;
            } else if (type === 'PHONE') {
                locationField.placeholder = 'Phone Interview';
                meetingLinkField.required = false;
            } else if (type === 'IN_PERSON') {
                locationField.placeholder = 'Office Address or Meeting Room';
                meetingLinkField.required = false;
            } else {
                locationField.placeholder = 'Location details';
                meetingLinkField.required = false;
            }
        });

        // Set minimum date to today
        document.getElementById('scheduledTime').min = new Date().toISOString().slice(0, 16);
    </script>
</body>
</html>
