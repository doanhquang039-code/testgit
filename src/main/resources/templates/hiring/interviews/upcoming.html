<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Interviews - Hiring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f4f6fb; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .interview-row:hover { background: #f8f9fa; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="fragments/hiring-sidebar :: sidebar"></div>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <div class="d-flex justify-content-between align-items-center pb-2 mb-4 border-bottom">
                <div>
                    <h1 class="h3 fw-bold mb-0">
                        <i class="bi bi-calendar-week me-2 text-info"></i>Upcoming Interviews
                    </h1>
                    <small class="text-muted">Next 2 weeks schedule</small>
                </div>
                <a href="/hiring/interviews/create" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>Schedule Interview
                </a>
            </div>

            <!-- Empty State -->
            <div th:if="${interviews == null or interviews.empty}" class="text-center py-5">
                <div class="card p-5">
                    <i class="bi bi-calendar2-x text-muted display-4 mb-3"></i>
                    <h5 class="text-muted">No upcoming interviews in the next 2 weeks</h5>
                    <a href="/hiring/interviews/create" class="btn btn-primary mt-3">
                        <i class="bi bi-plus-circle me-1"></i>Schedule an Interview
                    </a>
                </div>
            </div>

            <!-- Interview List -->
            <div th:if="${interviews != null and !interviews.empty}">
                <!-- Group by date summary -->
                <div class="row mb-3 g-3">
                    <div class="col-md-3">
                        <div class="card bg-primary text-white">
                            <div class="card-body text-center">
                                <h4 class="fw-bold mb-0" th:text="${interviews.size()}">0</h4>
                                <small>Total Upcoming</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Candidate</th>
                                        <th>Type</th>
                                        <th>Interviewer</th>
                                        <th>Date &amp; Time</th>
                                        <th>Duration</th>
                                        <th>Location</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="interview : ${interviews}" class="interview-row">
                                        <td>
                                            <a th:href="@{/hiring/candidates/{id}(id=${interview.candidate?.id})}"
                                               class="text-decoration-none fw-semibold"
                                               th:text="${interview.candidate?.fullName ?: 'N/A'}">Candidate</a>
                                        </td>
                                        <td>
                                            <span class="badge bg-info text-white"
                                                  th:text="${interview.interviewType ?: 'N/A'}">TECHNICAL</span>
                                        </td>
                                        <td th:text="${interview.interviewer?.fullName ?: 'TBD'}">TBD</td>
                                        <td>
                                            <span th:text="${interview.scheduledTime != null ? #temporals.format(interview.scheduledTime,'dd/MM/yyyy HH:mm') : 'N/A'}">-</span>
                                        </td>
                                        <td th:text="${interview.durationMinutes != null ? interview.durationMinutes + ' min' : 'N/A'}">N/A</td>
                                        <td th:text="${interview.location ?: 'N/A'}">N/A</td>
                                        <td>
                                            <span class="badge"
                                                  th:classappend="${interview.status=='COMPLETED'}?'bg-success':
                                                                  (${interview.status=='CANCELLED'}?'bg-danger':'bg-warning text-dark')"
                                                  th:text="${interview.status}">SCHEDULED</span>
                                        </td>
                                        <td>
                                            <div class="d-flex gap-1">
                                                <a th:href="@{/hiring/interviews/{id}(id=${interview.id})}"
                                                   class="btn btn-sm btn-outline-primary">
                                                    <i class="bi bi-eye"></i>
                                                </a>
                                                <a th:href="@{/hiring/interviews/{id}/feedback(id=${interview.id})}"
                                                   class="btn btn-sm btn-outline-success"
                                                   th:if="${interview.status == 'SCHEDULED'}">
                                                    <i class="bi bi-chat-dots"></i>
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
