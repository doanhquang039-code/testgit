<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Feedback - Hiring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f4f6fb; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .score-slider { accent-color: #4f6ef7; }
        .score-display { font-size: 1.5rem; font-weight: 700; color: #4f6ef7; min-width: 50px; text-align: center; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="fragments/hiring-sidebar :: sidebar"></div>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <div class="d-flex justify-content-between align-items-center pb-2 mb-4 border-bottom">
                <div>
                    <h1 class="h3 fw-bold mb-0">
                        <i class="bi bi-chat-dots me-2 text-success"></i>Interview Feedback
                    </h1>
                    <small class="text-muted" th:text="${interview.candidate?.fullName ?: 'Candidate'}">Candidate</small>
                </div>
                <a th:href="@{/hiring/interviews/{id}(id=${interview.id})}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </a>
            </div>

            <!-- Interview Summary -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <p class="text-muted small mb-1">Candidate</p>
                            <p class="fw-semibold mb-0" th:text="${interview.candidate?.fullName ?: 'N/A'}">N/A</p>
                        </div>
                        <div class="col-md-3">
                            <p class="text-muted small mb-1">Interview Type</p>
                            <span class="badge bg-info text-white" th:text="${interview.interviewType ?: 'N/A'}">N/A</span>
                        </div>
                        <div class="col-md-3">
                            <p class="text-muted small mb-1">Scheduled Time</p>
                            <p class="mb-0" th:text="${interview.scheduledTime != null ? #temporals.format(interview.scheduledTime,'dd/MM/yyyy HH:mm') : 'N/A'}">N/A</p>
                        </div>
                        <div class="col-md-3">
                            <p class="text-muted small mb-1">Status</p>
                            <span class="badge bg-warning text-dark" th:text="${interview.status}">SCHEDULED</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Feedback Form -->
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-clipboard-check me-2"></i>Submit Interview Feedback</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/hiring/interviews/{id}/feedback(id=${interview.id})}" method="post">

                        <!-- Score Sliders -->
                        <div class="mb-4">
                            <h6 class="fw-bold mb-3">Scoring (0-100)</h6>
                            <div class="row g-4">
                                <!-- Technical Score -->
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">
                                        <i class="bi bi-code-slash me-1 text-info"></i>Technical Score
                                    </label>
                                    <div class="d-flex align-items-center gap-3">
                                        <input type="range" class="form-range score-slider flex-grow-1"
                                               name="technicalScore" id="technicalScore"
                                               min="0" max="100" value="70"
                                               oninput="document.getElementById('techVal').textContent=this.value">
                                        <span id="techVal" class="score-display">70</span>
                                    </div>
                                </div>

                                <!-- Communication Score -->
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">
                                        <i class="bi bi-chat me-1 text-success"></i>Communication Score
                                    </label>
                                    <div class="d-flex align-items-center gap-3">
                                        <input type="range" class="form-range score-slider flex-grow-1"
                                               name="communicationScore" id="communicationScore"
                                               min="0" max="100" value="70"
                                               oninput="document.getElementById('commVal').textContent=this.value">
                                        <span id="commVal" class="score-display">70</span>
                                    </div>
                                </div>

                                <!-- Cultural Fit Score -->
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">
                                        <i class="bi bi-people me-1 text-warning"></i>Cultural Fit Score
                                    </label>
                                    <div class="d-flex align-items-center gap-3">
                                        <input type="range" class="form-range score-slider flex-grow-1"
                                               name="culturalFitScore" id="culturalFitScore"
                                               min="0" max="100" value="70"
                                               oninput="document.getElementById('cultVal').textContent=this.value">
                                        <span id="cultVal" class="score-display">70</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Recommendation -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Recommendation *</label>
                            <div class="d-flex gap-3">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="recommendation"
                                           id="recHire" value="HIRE" required>
                                    <label class="form-check-label text-success fw-semibold" for="recHire">
                                        <i class="bi bi-check-circle me-1"></i>Hire
                                    </label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="recommendation"
                                           id="recHold" value="HOLD">
                                    <label class="form-check-label text-warning fw-semibold" for="recHold">
                                        <i class="bi bi-pause-circle me-1"></i>Hold
                                    </label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="recommendation"
                                           id="recReject" value="REJECT">
                                    <label class="form-check-label text-danger fw-semibold" for="recReject">
                                        <i class="bi bi-x-circle me-1"></i>Reject
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Feedback -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Detailed Feedback *</label>
                            <textarea name="feedback" class="form-control" rows="6" required
                                      placeholder="Provide detailed feedback about the candidate's performance, strengths, weaknesses, and overall impression..."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle me-1"></i>Submit Feedback
                            </button>
                            <a th:href="@{/hiring/interviews/{id}(id=${interview.id})}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
