<div th:fragment="widget" class="hrms-health-widget mb-4">
    <div class="hrms-health-head">
        <div>
            <div class="hrms-health-kicker">Health insight</div>
            <h2>Dự đoán sức khỏe làm việc</h2>
        </div>
        <i class="bi bi-heart-pulse"></i>
    </div>
    <form class="hrms-health-form" data-health-form>
        <label>Ngủ<input type="number" step="0.5" min="0" max="16" name="sleepHours" value="7"><span>giờ</span></label>
        <label>Stress<input type="number" min="1" max="10" name="stressLevel" value="4"><span>/10</span></label>
        <label>Bước<input type="number" min="0" name="steps" value="6000"><span>bước</span></label>
        <label>Nước<input type="number" step="0.1" min="0" name="waterLiters" value="1.8"><span>lít</span></label>
        <label>OT<input type="number" step="0.5" min="0" name="overtimeHours" value="0"><span>giờ</span></label>
        <button type="submit"><i class="bi bi-activity"></i> Phân tích</button>
    </form>
    <div class="hrms-health-result" data-health-result>
        Nhập dữ liệu sinh hoạt trong ngày để nhận cảnh báo tải việc và gợi ý cân bằng.
    </div>
</div>
