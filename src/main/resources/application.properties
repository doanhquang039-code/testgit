spring.config.import=optional:classpath:application-local.properties
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
# --- Hibernate config ---
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

spring.flyway.out-of-order=true
# --- Flyway config ---
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=false
logging.level.org.springframework.security=DEBUG
spring.thymeleaf.cache=false

# ===== I18N =====
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.use-code-as-default-message=true
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ========== REDIS ==========
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
# Timeout kết nối Redis (ms)
spring.redis.timeout=2000ms
# Nếu Redis không available, app vẫn chạy bình thường (cache miss)
spring.cache.type=redis
spring.cache.redis.enable-statistics=true
# Disable Redis repository auto-config để tránh conflict với JPA
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
# Không throw exception khi Redis down — fallback về no-cache
spring.cache.redis.cache-null-values=false
spring.redis.url=${REDIS_URL:}

# ========== SPRINGDOC / SWAGGER ==========
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.example.hr
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.groups-order=ASC

# ========== ACTUATOR ==========
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=HR Management System
info.app.version=2.0.0
info.app.description=Full-featured HRMS with Spring Boot + Redis + Cloudinary + AI
# ========== SENDGRID ==========
# Đặt sendgrid.enabled=true và điền API key để dùng SendGrid
# Nếu false, hệ thống fallback về Gmail SMTP bên dưới
sendgrid.enabled=true
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from-email=noreply@hrms.com
sendgrid.from-name=HRMS System
spring.main.allow-bean-definition-overriding=true
# ========== AWS S3 ==========
aws.s3.enabled=false
aws.s3.access-key=${AWS_ACCESS_KEY:}
aws.s3.secret-key=${AWS_SECRET_KEY:}
aws.s3.region=${AWS_REGION:ap-southeast-1}
aws.s3.bucket=${AWS_S3_BUCKET:hrms-reports-backup}

# ========== FIREBASE ==========
# ========== FIREBASE ==========
firebase.enabled=false
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT:}
firebase.service-account-path=firebase-service-account.json
firebase.database-url=${FIREBASE_DATABASE_URL:}

# ========== GOOGLE DRIVE ==========
google.drive.enabled=true
google.drive.service-account-json=${GOOGLE_DRIVE_SERVICE_ACCOUNT:}
google.drive.service-account-path=google-drive-service-account.json
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:your-folder-id}

# ========== AI / GEMINI ==========
# Lấy API key miễn phí tại: https://aistudio.google.com/app/apikey
ai.gemini.enabled=false
ai.gemini.api-key=${GEMINI_API_KEY:}
ai.gemini.model=gemini-1.5-flash
ai.gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models
# ========== EMAIL (Gmail) ==========
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========== GOOGLE OAuth2 ==========
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ========== FACEBOOK OAuth2 ==========
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.facebook.scope=public_profile
spring.security.oauth2.client.provider.facebook.user-name-attribute=id
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/facebook

# ========== CỔNG THANH TOÁN (MoMo + VNPay / ngân hàng) ==========
# baseUrl: domain thật khi triển khai (MoMo/VNPay gọi callback về URL này)
payment.gateway.base-url=http://localhost:8080
# MoMo — lấy partnerCode / accessKey / secretKey từ business.momo.vn (test hoặc production)
payment.gateway.momo.enabled=false
payment.gateway.momo.partner-code=
payment.gateway.momo.access-key=
payment.gateway.momo.secret-key=
payment.gateway.momo.endpoint=https://test-payment.momo.vn
payment.gateway.momo.create-path=/v2/gateway/api/create
payment.gateway.momo.partner-name=HRMS
payment.gateway.momo.store-id=HRMS
# VNPay sandbox — https://sandbox.vnpayment.vn/
payment.gateway.vnpay.enabled=false
payment.gateway.vnpay.tmn-code=
payment.gateway.vnpay.hash-secret=
payment.gateway.vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html

# ========== GOOGLE DRIVE ==========
google.drive.enabled=true
google.drive.service-account-path=google-drive-service-account.json
google.drive.folder-id=

# ========== KAFKA ==========
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=hr-management-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# Kafka Topics
kafka.topics.attendance=hr-attendance
kafka.topics.leave-requests=hr-leave-requests
kafka.topics.payroll=hr-payroll
kafka.topics.notifications=hr-notifications
kafka.topics.performance-reviews=hr-performance-reviews
kafka.topics.recruitment=hr-recruitment
kafka.topics.training=hr-training
kafka.topics.employee-lifecycle=hr-employee-lifecycle

# ========== RABBITMQ ==========
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.queue.email=hr-email-queue
rabbitmq.queue.sms=hr-sms-queue
rabbitmq.queue.reports=hr-reports-queue
rabbitmq.exchange.hr=hr-exchange

# ========== ELASTICSEARCH ==========
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=
spring.elasticsearch.password=
spring.data.elasticsearch.repositories.enabled=false

# ========== HAZELCAST ==========
hazelcast.enabled=true
hazelcast.cluster-name=hr-cluster
hazelcast.network.port=5701

# ========== MONITORING (PROMETHEUS) ==========
management.endpoints.web.exposure.include=health,info,metrics,loggers,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ========== DISTRIBUTED TRACING (ZIPKIN) ==========
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ========== WEBSOCKET ==========
websocket.allowed-origins=http://localhost:8080,http://localhost:3000

# ========== QUARTZ SCHEDULER ==========
# Disabled due to configuration complexity - can be enabled later when needed
spring.quartz.job-store-type=memory
#spring.quartz.jdbc.initialize-schema=always
#spring.quartz.properties.org.quartz.scheduler.instanceName=HRScheduler
#spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
#spring.quartz.properties.org.quartz.threadPool.threadCount=10
#spring.quartz.properties.org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
#spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
#spring.quartz.properties.org.quartz.jobStore.tablePrefix=QRTZ_
#spring.quartz.properties.org.quartz.jobStore.isClustered=true

# ========== SPRING BATCH ==========
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# ========== GRAPHQL ==========
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql

# ========== RESILIENCE4J ==========
# Circuit Breaker
resilience4j.circuitbreaker.instances.emailService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.emailService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.emailService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.emailService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.emailService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.emailService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.emailService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.emailService.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.emailService.slowCallDurationThreshold=2s

# Rate Limiter
resilience4j.ratelimiter.instances.publicApi.limitForPeriod=100
resilience4j.ratelimiter.instances.publicApi.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.publicApi.timeoutDuration=0s

# Retry
resilience4j.retry.instances.emailService.maxAttempts=3
resilience4j.retry.instances.emailService.waitDuration=1s
resilience4j.retry.instances.emailService.enableExponentialBackoff=true
resilience4j.retry.instances.emailService.exponentialBackoffMultiplier=2

# ========== CAMUNDA BPM ==========
camunda.bpm.admin-user.id=admin
camunda.bpm.admin-user.password=admin
camunda.bpm.admin-user.firstName=Admin
camunda.bpm.filter.create=All tasks

# ========== WEB3J (BLOCKCHAIN) ==========
web3j.client-address=https://mainnet.infura.io/v3/YOUR_INFURA_PROJECT_ID
web3j.enabled=false
