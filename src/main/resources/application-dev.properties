# ========================================
# DEV PROFILE - FAST STARTUP
# ========================================
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev

# ========== DISABLE SLOW SERVICES ==========
# Disable Kafka (saves ~10 seconds)
spring.kafka.bootstrap-servers=
spring.kafka.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Disable Google Drive (saves ~30 seconds)
google.drive.enabled=false

# Disable Firebase
firebase.enabled=false

# Disable AI/Gemini
ai.gemini.enabled=false

# Disable AWS S3
aws.s3.enabled=false

# Disable Payment Gateways
payment.gateway.momo.enabled=false
payment.gateway.vnpay.enabled=false

# Disable SendGrid
sendgrid.enabled=false

# Disable RabbitMQ
spring.rabbitmq.host=

# Disable Elasticsearch
spring.data.elasticsearch.repositories.enabled=false

# Disable Zipkin tracing
management.tracing.sampling.probability=0.0

# Disable Web3j
web3j.enabled=false

# ========== FASTER HAZELCAST ==========
# Use TCP instead of Multicast for faster startup
hazelcast.enabled=true
hazelcast.network.join.multicast.enabled=false
hazelcast.network.join.tcp-ip.enabled=true
hazelcast.network.join.tcp-ip.members=127.0.0.1

# ========== FASTER HIBERNATE ==========
# Don't validate schema on startup
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ========== FASTER FLYWAY ==========
# Skip validation
spring.flyway.validate-on-migrate=false

# ========== DISABLE DEVTOOLS RESTART ==========
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ========== FASTER TOMCAT ==========
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10

# ========== LOGGING ==========
logging.level.root=WARN
logging.level.com.example.hr=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.apache.kafka=ERROR
logging.level.com.hazelcast=WARN

# ========== CACHE ==========
spring.cache.type=simple
